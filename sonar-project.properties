# SonarQube Configuration for GoldPC
# ==================================================

sonar.projectKey=goldpc
sonar.projectName=GoldPC
sonar.projectVersion=1.0

# Source code
sonar.sources=src/backend,src/frontend/src
sonar.tests=tests/backend,tests/frontend

# Language-specific settings
sonar.csharp.exclusions=**/Migrations/**,**/*.Designer.cs
sonar.typescript.exclusions=**/node_modules/**,**/*.test.ts,**/*.spec.ts

# Coverage
sonar.coverage.exclusions=**/Migrations/**,**/*.test.ts,**/*.spec.ts,**/Program.cs,**/Startup.cs
sonar.csharp.minCoverage=70
sonar.typescript.lcov.reportPaths=src/frontend/coverage/lcov.info

# Security
sonar.security.hotspots.review=true
sonar.security.sensitive.data.exposure=true
sonar.security.sql.injection=true
sonar.security.xss=true
sonar.security.csrf=true

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Complexity
sonar.cognitive_complexity.threshold=15
sonar.function.complexity.threshold=10

# Duplications
sonar.cpd.exclusions=**/generated/**,**/*.min.js,**/Migrations/**

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/bin/**,**/obj/**,**/*.min.js,**/*.min.css

# Test exclusions
sonar.test.exclusions=**/node_modules/**

# Encoding
sonar.sourceEncoding=UTF-8
</task_progress>
</write_to_file>