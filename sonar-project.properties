# SonarQube Configuration for GoldPC
# ==================================================

sonar.projectKey=goldpc
sonar.projectName=GoldPC
sonar.projectVersion=1.0

# Source code paths
sonar.sources=src/
sonar.tests=tests/

# Language-specific exclusions
sonar.csharp.exclusions=**/Migrations/**,**/*.Designer.cs
sonar.typescript.exclusions=**/node_modules/**,**/*.test.ts,**/*.spec.ts

# Coverage exclusions
sonar.coverage.exclusions=**/Migrations/**,**/*.test.ts

# .NET Coverage Report (Coverlet/OpenCover format)
# Generated by: dotnet test --collect:"XPlat Code Coverage"
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml,tests/**/TestResults/**/coverage.opencover.xml
sonar.dotnet.excludeTestProjects=true

# JavaScript/TypeScript Coverage Report (LCOV format)
# Generated by: npm run test:coverage
sonar.typescript.lcov.reportPaths=src/frontend/coverage/lcov.info

# Minimum coverage thresholds
sonar.csharp.minCoverage=70

# Security Hotspots
sonar.security.hotspots.review=true

# Security-specific flags (Section 1.2)
sonar.security.sensitive.data.exposure=true
sonar.security.sql.injection=true
sonar.security.xss=true
sonar.security.csrf=true

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Complexity Thresholds
sonar.cognitive_complexity.threshold=15

# Duplications
sonar.cpd.exclusions=**/generated/**,**/*.min.js,**/Migrations/**

# General Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/bin/**,**/obj/**,**/*.min.js,**/*.min.css

# Test Exclusions
sonar.test.exclusions=**/node_modules/**

# Encoding
sonar.sourceEncoding=UTF-8
</task_progress>
</write_to_file>