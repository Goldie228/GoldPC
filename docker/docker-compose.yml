services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: goldpc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: goldpc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goldpc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - goldpc-net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: goldpc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - goldpc-net

  # Catalog Service
  catalogservice:
    build:
      context: ../src
      dockerfile: ../docker/Dockerfile.CatalogService
    container_name: goldpc-catalog
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__DefaultConnection=Server=postgres;Database=goldpc;User Id=postgres;Password=admin
      - ConnectionStrings__PostgreSQL=Server=postgres;Database=goldpc;User Id=postgres;Password=admin
      - ConnectionStrings__Redis=redis:6379
      - Redis__Host=redis
      - Redis__Port=6379
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - goldpc-net
    restart: on-failure

  # PC Builder Service
  pcbuilderservice:
    build:
      context: ../src
      dockerfile: ../docker/Dockerfile.PCBuilderService
    container_name: goldpc-pcbuilder
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__DefaultConnection=Server=postgres;Database=goldpc;User Id=postgres;Password=admin
      - ConnectionStrings__Redis=redis:6379
      - CatalogService__Url=http://catalogservice:5001
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      catalogservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - goldpc-net
    restart: on-failure

  # Auth Service
  authservice:
    build:
      context: ../src
      dockerfile: ../docker/Dockerfile.AuthService
    container_name: goldpc-auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__PostgreSQL=Server=postgres;Database=goldpc;User Id=postgres;Password=admin
      - JwtSettings__Secret=your-super-secret-key-for-development-min-32-chars!
      - JwtSettings__Issuer=goldpc
      - JwtSettings__Audience=goldpc-users
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - goldpc-net
    restart: on-failure

  # Frontend (Nginx + React)
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: goldpc-frontend
    ports:
      - "8080:8080"
    depends_on:
      catalogservice:
        condition: service_healthy
      pcbuilderservice:
        condition: service_healthy
      authservice:
        condition: service_healthy
    networks:
      - goldpc-net
    restart: on-failure

volumes:
  postgres_data:
  redis_data:

networks:
  goldpc-net:
    driver: bridge