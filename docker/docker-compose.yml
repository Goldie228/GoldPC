services:
  # PostgreSQL Primary
  postgres:
    image: postgres:16-alpine
    container_name: goldpc-postgres
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c archive_mode=on
      -c archive_command='test ! -f /var/lib/postgresql/data/archive/%f && cp %p /var/lib/postgresql/data/archive/%f'
      -c shared_preload_libraries='pg_stat_statements'
      -c pg_stat_statements.track=all
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: goldpc
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
      - ./postgres/setup-archive.sh:/docker-entrypoint-initdb.d/setup-archive.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goldpc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - goldpc-network

  # PostgreSQL Replica
  postgres-replica:
    image: postgres:16-alpine
    container_name: goldpc-postgres-replica
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: goldpc
      PGPASSWORD: admin
    command: >
      bash -c "
      until pg_basebackup -h postgres -D /var/lib/postgresql/data -U postgres -vP -R -X stream; do
        echo 'Waiting for primary to be ready...'
        sleep 1
      done
      echo 'Backup done, starting replica...'
      exec postgres
      "
    ports:
      - "5435:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - goldpc-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: goldpc-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - goldpc-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: goldpc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - goldpc-network

  # Catalog Service
  catalog.api:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile.CatalogService
    container_name: goldpc-catalog
    volumes:
      - ../src/CatalogService/uploads:/app/uploads
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=postgres;Database=goldpc_catalog;User Id=postgres;Password=admin
      - ConnectionStrings__PostgreSQL=Server=postgres;Database=goldpc_catalog;User Id=postgres;Password=admin
      - ConnectionStrings__Redis=redis:6379
      - Redis__Host=redis
      - Redis__Port=6379
    ports:
      - "9081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - goldpc-network
    restart: on-failure

  # Auth Service
  auth.api:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile.AuthService
    container_name: goldpc-auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=postgres;Database=goldpc_auth;User Id=postgres;Password=admin
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=goldpc
      - JwtSettings__Audience=goldpc-users
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__Username=pascalixsprivate@gmail.com
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__FromEmail=pascalixsprivate@gmail.com
      - Smtp__FromName=GoldPC
    ports:
      - "9082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - goldpc-network
    restart: on-failure

  # Services Service
  services.api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ServicesService
    container_name: goldpc-services
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=goldpc_services;Username=postgres;Password=admin
      - RabbitMq__Host=rabbitmq
      - Redis__ConnectionString=redis:6379
      - Services__WarrantyService=http://warranty-service:5004
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - goldpc-network
    restart: on-failure

  # Frontend (Nginx + React)
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: goldpc-frontend
    ports:
      - "3002:3000"
    depends_on:
      catalog.api:
        condition: service_healthy
      auth.api:
        condition: service_healthy
    networks:
      - goldpc-network
    restart: on-failure

  # Adminer (Database Management UI)
  adminer:
    image: adminer:latest
    container_name: goldpc-adminer
    ports:
      - "9090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - goldpc-network
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  goldpc-network:
    driver: bridge