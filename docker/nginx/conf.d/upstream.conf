# =============================================================================
# Upstream Configuration
# =============================================================================
# Maps nginx upstream names to Docker Compose service names.
# Service names and ports must match docker-compose.yml exactly.
# =============================================================================

# Catalog Service (Docker service: catalog.api, port 8080)
upstream backend_catalog {
    server catalog.api:8080;
    keepalive 32;
}

# Auth Service (Docker service: auth.api, port 8080)
upstream backend_auth {
    server auth.api:8080;
    keepalive 32;
}

# Services Service (Docker service: services.api, port 5003)
upstream backend_services {
    server services.api:5003;
    keepalive 32;
}

# Frontend (Docker service: frontend, port 3000)
upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}