# =============================================================================
# GoldPC Production Nginx Configuration
# Blue-Green Deployment Ready
# =============================================================================
# This configuration supports zero-downtime Blue-Green deployments.
# The upstream configuration is managed dynamically by the deployment script.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ==========================================================================
    # Logging Configuration
    # ==========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_connect_time":"$upstream_connect_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # ==========================================================================
    # Performance Optimization
    # ==========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    
    # Buffer settings
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 10m;
    large_client_header_buffers 4 8k;

    # ==========================================================================
    # Gzip Compression
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ==========================================================================
    # Security Headers
    # ==========================================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ==========================================================================
    # Rate Limiting
    # ==========================================================================
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Limit request body size
    client_max_body_size 50m;

    # ==========================================================================
    # SSL Configuration (when enabled)
    # ==========================================================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ==========================================================================
    # Upstream Definitions (managed by deployment script)
    # ==========================================================================
    # The upstream.conf file is dynamically generated during Blue-Green deployment
    # Default configuration points to Blue slot
    include /etc/nginx/conf.d/upstream.conf;

    # ==========================================================================
    # Health Check Endpoint (for load balancers)
    # ==========================================================================
    server {
        listen 8080;
        server_name localhost;

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ==========================================================================
    # Main Server Block
    # ==========================================================================
    server {
        listen 80;
        server_name goldpc.by www.goldpc.by localhost;

        # Redirect HTTP to HTTPS in production
        # return 301 https://$server_name$request_uri;

        # Security: Hide Nginx version
        server_tokens off;

        # ==========================================================================
        # Health Check
        # ==========================================================================
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ==========================================================================
        # API Endpoints - Catalog Service
        # ==========================================================================
        location /api/v1/catalog/ {
            limit_req zone=api burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://backend_catalog/;
            proxy_http_version 1.1;
            
            # Connection settings
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Keep-alive
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # ==========================================================================
        # API Endpoints - PC Builder Service
        # ==========================================================================
        location /api/v1/pcbuilder/ {
            limit_req zone=api burst=30 nodelay;
            limit_conn conn_limit 15;

            proxy_pass http://backend_pcbuilder/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # ==========================================================================
        # API Endpoints - Auth Service (stricter rate limiting)
        # ==========================================================================
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://backend_auth/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Don't cache auth responses
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
            
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # ==========================================================================
        # API Endpoints - Orders Service
        # ==========================================================================
        location /api/v1/orders/ {
            limit_req zone=api burst=30 nodelay;
            limit_conn conn_limit 15;

            # Note: Add orders upstream when service is ready
            proxy_pass http://backend_catalog/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ==========================================================================
        # Static Files Caching
        # ==========================================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            
            # Aggressive caching for static assets
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            
            # Log static file requests separately
            access_log /var/log/nginx/static.log json_combined;
        }

        # ==========================================================================
        # Frontend - React SPA
        # ==========================================================================
        location / {
            limit_req zone=general burst=100 nodelay;
            limit_conn conn_limit 30;

            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            
            # WebSocket support for hot reload (dev) or live features
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Don't cache HTML for SPA
            add_header Cache-Control "no-cache";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ==========================================================================
        # Error Pages
        # ==========================================================================
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # ==========================================================================
        # Deny Access to Hidden Files
        # ==========================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ==========================================================================
        # Deny Access to Sensitive Files
        # ==========================================================================
        location ~* \.(env|git|gitignore|dockerignore|md|yaml|yml|json|lock)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ==========================================================================
    # HTTPS Server Block (SSL)
    # ==========================================================================
    server {
        listen 443 ssl http2;
        server_name goldpc.by www.goldpc.by;

        # SSL certificates
        ssl_certificate /etc/nginx/ssl/goldpc.by.crt;
        ssl_certificate_key /etc/nginx/ssl/goldpc.by.key;

        # Security
        server_tokens off;

        # HSTS (1 year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Same location blocks as HTTP above
        # (In production, you would use include directive to avoid duplication)

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location /api/v1/catalog/ {
            limit_req zone=api burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://backend_catalog/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/v1/pcbuilder/ {
            limit_req zone=api burst=30 nodelay;
            limit_conn conn_limit 15;

            proxy_pass http://backend_pcbuilder/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://backend_auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_upstream;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            limit_req zone=general burst=100 nodelay;
            limit_conn conn_limit 30;

            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Cache-Control "no-cache";
        }

        location ~ /\. {
            deny all;
        }
    }
}