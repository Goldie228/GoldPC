# GitHub Repository Settings (probot-settings)
# Подробнее: https://github.com/repository-settings/app

# ===========================================
# Настройки репозитория
# ===========================================
repository:
  name: GoldPC
  description: "GoldPC - Система для сборки персональных компьютеров"
  homepage: ""
  private: false
  has_issues: true
  has_projects: true
  has_wiki: true
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  delete_branch_on_merge: true

# ===========================================
# Настройки веток
# ===========================================
branches:
  # ===========================================
  # MAIN - Защищённая ветка для production
  # ===========================================
  - name: main
    protection:
      # Требования к Pull Request отзывам
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        required_approving_review_count: 2
      
      # Обязательные статус-проверки
      required_status_checks:
        strict: true
        contexts:
          - "lint"
          - "build"
          - "test"
      
      # Применять правила к администраторам
      enforce_admins: true
      
      # Ограничения по пользователям/командам
      restrictions:
        users: []
        teams: []
      
      # Разрешить force push (false = запрещено)
      allow_force_pushes: false
      
      # Разрешить удаления (false = запрещено)
      allow_deletions: false

  # ===========================================
  # DEVELOP - Ветка для интеграции
  # ===========================================
  - name: develop
    protection:
      # Требования к Pull Request отзывам
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        required_approving_review_count: 1
      
      # Обязательные статус-проверки
      required_status_checks:
        strict: true
        contexts:
          - "lint"
          - "build"
          - "test"
      
      # Применять правила к администраторам
      enforce_admins: false
      
      # Ограничения по пользователям/командам
      restrictions:
        users: []
        teams: []
      
      # Разрешить force push (false = запрещено)
      allow_force_pushes: false
      
      # Разрешить удаления (false = запрещено)
      allow_deletions: false

# ===========================================
# Настройки меток (Labels)
# ===========================================
labels:
  - name: "bug"
    color: "d73a4a"
    description: "Что-то работает неправильно"
  
  - name: "feature"
    color: "a2eeef"
    description: "Новая функциональность"
  
  - name: "enhancement"
    color: "84b6eb"
    description: "Улучшение существующей функциональности"
  
  - name: "documentation"
    color: "0075ca"
    description: "Улучшения документации"
  
  - name: "security"
    color: "b60205"
    description: "Связано с безопасностью"
  
  - name: "breaking-change"
    color: "e99695"
    description: "Breaking change - требует миграции"
  
  - name: "architecture"
    color: "5319e7"
    description: "Архитектурные изменения"
  
  - name: "blocker"
    color: "b60205"
    description: "Блокирует merge - требует немедленного исправления"
  
  - name: "major"
    color: "ff9f1c"
    description: "Важное замечание - исправление в течение 1 дня"
  
  - name: "minor"
    color: "fbca04"
    description: "Незначительное замечание - исправление в течение 3 дней"
  
  - name: "suggestion"
    color: "1d76db"
    description: "Предложение по улучшению - не блокирует merge"

# ===========================================
# Команды (если используется GitHub Teams)
# ===========================================
teams:
  - name: "maintainers"
    permission: "maintain"
  
  - name: "developers"
    permission: "push"
  
  - name: "reviewers"
    permission: "triage"