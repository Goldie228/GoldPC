name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: src/frontend
        run: npm run lint -- --max-warnings 0
      
      - name: Run Prettier check
        working-directory: src/frontend
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Run dotnet format
        run: dotnet format --verify-no-changes --severity warn
      
      - name: Build with warnings as errors
        run: dotnet build --configuration Release --warnaserror

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Run Architecture Tests
        run: dotnet test --filter "FullyQualifiedName~ArchitectureTests"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependency-cruiser
        working-directory: src/frontend
        run: npm ci
      
      - name: Run dependency-cruiser
        working-directory: src/frontend
        run: npx depcruise src --config .dependency-cruiser.js --output-type err-html | cat

  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate Dependencies
        run: node scripts/validate-all-dependencies.js
      
      - name: Validate API Contracts
        run: |
          npm install -g @stoplight/spectral-cli
          spectral lint docs/api/openapi/*.yaml || true
      
      - name: Run Tests with Coverage
        run: |
          dotnet test --configuration Release --collect:"XPlat Code Coverage" || true
          cd src/frontend && npm run test:coverage || true

      - name: Quality Gate Passed
        run: echo "✅ All quality checks passed!"
</task_progress>
</write_to_file>