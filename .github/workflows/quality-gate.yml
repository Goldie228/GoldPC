# Quality Gate Workflow
# CI/CD pipeline for code quality checks
# 
# Jobs:
#   - lint: Static analysis (dotnet format, npm run lint)
#   - architecture: Architecture Tests and Dependency Cruiser
#   - hallucination-check: Validate dependencies and detect AI hallucinations
#
# Strict mode: Fails on any check failure

name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Strict mode: fail fast on any job failure
concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # LINT JOB
  # Static analysis for frontend and backend
  # ===========================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - component: frontend
          - component: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Frontend lint
      - name: Setup Node.js
        if: matrix.component == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kursovaya/package-lock.json

      - name: Install frontend dependencies
        if: matrix.component == 'frontend'
        working-directory: kursovaya/src/frontend
        run: npm ci

      - name: Run ESLint
        if: matrix.component == 'frontend'
        working-directory: kursovaya/src/frontend
        run: npm run lint -- --max-warnings 0

      - name: Run Prettier check
        if: matrix.component == 'frontend'
        working-directory: kursovaya
        run: npx prettier --check "src/frontend/src/**/*.{ts,tsx,css,json}" "src/frontend/*.{json,js,ts}"

      # Backend lint
      - name: Setup .NET
        if: matrix.component == 'backend'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET dependencies
        if: matrix.component == 'backend'
        working-directory: kursovaya/src
        run: dotnet restore GoldPC.sln

      - name: Run dotnet format
        if: matrix.component == 'backend'
        working-directory: kursovaya/src
        run: dotnet format GoldPC.sln --verify-no-changes --severity warn --no-restore

      - name: Build with warnings as errors
        if: matrix.component == 'backend'
        working-directory: kursovaya/src
        run: dotnet build GoldPC.sln --configuration Release --warnaserror --no-restore

  # ===========================================
  # ARCHITECTURE JOB
  # Architecture Tests and Dependency Cruiser
  # ===========================================
  architecture:
    name: 🏗️ Architecture
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # .NET Architecture Tests
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET dependencies
        working-directory: kursovaya/src
        run: dotnet restore GoldPC.sln

      - name: Build solution
        working-directory: kursovaya/src
        run: dotnet build GoldPC.sln --configuration Release --no-restore

      - name: Run Architecture Tests
        working-directory: kursovaya
        run: dotnet test tests/ArchitectureTests/ArchitectureTests.csproj --configuration Release --no-build --logger "console;verbosity=detailed"

      # Frontend Dependency Cruiser
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kursovaya/package-lock.json

      - name: Install frontend dependencies
        working-directory: kursovaya/src/frontend
        run: npm ci

      - name: Install dependency-cruiser
        working-directory: kursovaya
        run: npm install -D dependency-cruiser

      - name: Run Dependency Cruiser
        working-directory: kursovaya
        run: |
          npx depcruise src/frontend/src \
            --config .dependency-cruiser-frontend.json \
            --output-type error \
            --no-progress

  # ===========================================
  # HALLUCINATION CHECK JOB
  # Validate dependencies and detect AI hallucinations
  # ===========================================
  hallucination-check:
    name: 🛡️ Hallucination Check
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all dependencies exist
        working-directory: kursovaya
        run: node scripts/validate-all-dependencies.js

      - name: Run Neuroslop Check
        working-directory: kursovaya
        run: node scripts/neuroslop-check.js

  # ===========================================
  # QUALITY GATE SUMMARY
  # Final status check
  # ===========================================
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, architecture, hallucination-check]
    if: always()
    
    steps:
      - name: Check all jobs status
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ needs.architecture.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hallucination Check | ${{ needs.hallucination-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: needs.lint.result != 'success' || needs.architecture.result != 'success' || needs.hallucination-check.result != 'success'
        run: |
          echo "❌ Quality Gate FAILED!"
          echo "One or more quality checks failed. Please review the results above."
          exit 1

      - name: Success
        if: needs.lint.result == 'success' && needs.architecture.result == 'success' && needs.hallucination-check.result == 'success'
        run: |
          echo "✅ All quality checks passed!"
          echo "Quality Gate PASSED - code is ready for merge."