# Pre-Review Checks for GoldPC
# Автоматизированные проверки перед Code Review
# Документ: development-plan/09-code-review-and-integration.md (Section 9.2)
#
# Все проверки должны быть пройдены перед тем, как PR станет доступен для ревью.
# Status Checks настраиваются в Branch Protection Rules.

name: Pre-Review Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  COVERAGE_THRESHOLD: 70

jobs:
  # =============================================================================
  # JOB 1: Lint & Format
  # =============================================================================
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Backend Lint ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        working-directory: src
        run: dotnet restore GoldPC.sln

      - name: Run dotnet format (verify no changes)
        working-directory: src
        run: |
          dotnet format GoldPC.sln --verify-no-changes --severity warn --no-restore
        continue-on-error: false

      # --- Frontend Lint ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install npm dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:frontend
        continue-on-error: false

      - name: Check Prettier formatting
        run: npm run format:check
        continue-on-error: false

  # =============================================================================
  # JOB 2: Build
  # =============================================================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Build Backend ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        working-directory: src
        run: dotnet restore GoldPC.sln

      - name: Build Backend (Release)
        working-directory: src
        run: dotnet build GoldPC.sln --configuration Release --no-restore

      # --- Build Frontend ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build:frontend

  # =============================================================================
  # JOB 3: Unit Tests with Coverage
  # =============================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        working-directory: src
        run: dotnet restore GoldPC.sln

      - name: Run Unit Tests with Coverage
        working-directory: src
        run: |
          dotnet test GoldPC.sln \
            --filter "FullyQualifiedName!~Integration&FullyQualifiedName!~E2E" \
            --configuration Release \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results.trx"

      - name: Extract Coverage Report
        id: coverage
        working-directory: src
        run: |
          # Find coverage file
          COVERAGE_FILE=$(find ./TestResults -name "coverage.cobertura.xml" | head -1)
          
          if [ -z "$COVERAGE_FILE" ]; then
            echo "::error::Coverage file not found"
            exit 1
          fi
          
          # Extract line-rate (coverage percentage)
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' "$COVERAGE_FILE" | head -1)
          COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc -l | cut -c1-5)
          
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "coverage_percent=$COVERAGE_PERCENT" >> $GITHUB_OUTPUT
          echo "📊 Coverage: $COVERAGE_PERCENT%"

      - name: Check Coverage Threshold
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          THRESHOLD=$(echo "${{ env.COVERAGE_THRESHOLD }} / 100" | bc -l)
          
          echo "Coverage: $(echo "$COVERAGE * 100" | bc -l)%"
          echo "Threshold: ${{ env.COVERAGE_THRESHOLD }}%"
          
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ($COVERAGE) is below ${{ env.COVERAGE_THRESHOLD }}% threshold"
            exit 1
          fi
          
          echo "✅ Coverage check passed"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: src/TestResults/
          retention-days: 7

  # =============================================================================
  # JOB 4: Security Scan (Semgrep + Snyk)
  # =============================================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SAST: Semgrep ---
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/csharp
            p/typescript
            p/react
        continue-on-error: false

      # --- Dependency Scan: Snyk ---
      - name: Setup Node.js for Snyk
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        run: npm ci

      - name: Run Snyk to check for vulnerabilities (Node.js)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=upgradable
        continue-on-error: false

      - name: Setup .NET for Snyk
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        working-directory: src
        run: dotnet restore GoldPC.sln

      - name: Run Snyk to check for vulnerabilities (.NET)
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=upgradable --file=src/GoldPC.sln
        continue-on-error: false

      # --- Secret Detection ---
      - name: Detect hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          
          # Check for potential secrets in source files
          if grep -r -E "(password|secret|api_key|token|apiKey|connectionString)\s*=\s*['\"](?!['\"])[^'\"]+['\"]" \
            --include="*.cs" --include="*.ts" --include="*.tsx" --include="*.js" \
            src/ 2>/dev/null | grep -v "appsettings.Development.json" | grep -v ".env.example"; then
            echo "::error::Found potential hardcoded secrets!"
            exit 1
          fi
          
          echo "✅ No hardcoded secrets detected"

  # =============================================================================
  # JOB 5: Architecture Tests (NetArchTest)
  # =============================================================================
  architecture-tests:
    name: 🏗️ Architecture Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        working-directory: src
        run: dotnet restore GoldPC.sln

      - name: Build Solution
        working-directory: src
        run: dotnet build GoldPC.sln --configuration Release --no-restore

      - name: Run Architecture Tests
        working-directory: src
        run: |
          dotnet test ../tests/ArchitectureTests/ArchitectureTests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=architecture-tests.trx" \
            --logger "console;verbosity=detailed"

      - name: Upload Architecture Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architecture-test-results
          path: tests/ArchitectureTests/TestResults/
          retention-days: 7

  # =============================================================================
  # GATE: Review Gate
  # Этот job подтверждает, что все проверки пройдены
  # Используется для Branch Protection Status Checks
  # =============================================================================
  review-gate:
    name: ✅ Review Gate
    runs-on: ubuntu-latest
    needs: [lint, build, unit-tests, security-scan, architecture-tests]
    if: success()
    steps:
      - name: Confirm all checks passed
        run: |
          echo "============================================"
          echo "✅ All pre-review checks passed!"
          echo "============================================"
          echo ""
          echo "📋 Passed checks:"
          echo "  ✓ Lint & Format"
          echo "  ✓ Build (Backend & Frontend)"
          echo "  ✓ Unit Tests (Coverage ≥ ${{ env.COVERAGE_THRESHOLD }}%)"
          echo "  ✓ Security Scan (Semgrep + Snyk)"
          echo "  ✓ Architecture Tests (NetArchTest)"
          echo ""
          echo "🔀 PR is ready for code review"
          echo "============================================"

  # =============================================================================
  # SUMMARY: PR Comment with Results
  # =============================================================================
  pr-summary:
    name: 📝 PR Summary
    runs-on: ubuntu-latest
    needs: [lint, build, unit-tests, security-scan, architecture-tests]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Create PR Summary
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              lint: '${{ needs.lint.result }}',
              build: '${{ needs.build.result }}',
              'unit-tests': '${{ needs.unit-tests.result }}',
              'security-scan': '${{ needs.security-scan.result }}',
              'architecture-tests': '${{ needs.architecture-tests.result }}'
            };
            
            const icons = {
              success: '✅',
              failure: '❌',
              cancelled: '⚪',
              skipped: '⏭️'
            };
            
            const allPassed = Object.values(results).every(r => r === 'success');
            
            const summary = `## 🔍 Pre-Review Checks Summary
            
            | Check | Status |
            |-------|--------|
            | 🔍 Lint & Format | ${icons[results.lint] || '❓'} ${results.lint} |
            | 🔨 Build | ${icons[results.build] || '❓'} ${results.build} |
            | 🧪 Unit Tests | ${icons[results['unit-tests']] || '❓'} ${results['unit-tests']} |
            | 🔒 Security Scan | ${icons[results['security-scan']] || '❓'} ${results['security-scan']} |
            | 🏗️ Architecture Tests | ${icons[results['architecture-tests']] || '❓'} ${results['architecture-tests']} |
            
            ---
            
            ${allPassed 
              ? '### ✅ All checks passed! PR is ready for review.' 
              : '### ❌ Some checks failed. Please fix the issues before requesting review.'}
            `;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });