name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Еженедельно в понедельник в 2:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ============================================
  # Trivy: Filesystem Vulnerability Scanner
  # ============================================
  trivy:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'
        continue-on-error: true

      - name: Upload Trivy artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-fs-report
          path: trivy-fs-results.sarif
          retention-days: 30

  # ============================================
  # CodeQL: Static Analysis for Security
  # ============================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript-typescript
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - '**/test/**'
              - '**/tests/**'
              - '**/*.Test/**'
              - '**/*.Tests/**'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Backend (.NET)
        run: |
          cd src
          dotnet restore
          dotnet build --configuration Release --no-restore
        continue-on-error: true

      - name: Install Frontend Dependencies
        working-directory: src/frontend
        run: npm ci
        continue-on-error: true

      - name: Build Frontend
        working-directory: src/frontend
        run: npm run build
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: 'codeql-security'
          upload: true

  # ============================================
  # Gitleaks: Secret Detection
  # ============================================
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: --redact --report-path gitleaks-report.sarif --report-format sarif
        continue-on-error: true

      - name: Upload Gitleaks results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'gitleaks-report.sarif'
          category: 'gitleaks-secrets'
        continue-on-error: true

      - name: Upload Gitleaks artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 30

  # ============================================
  # OWASP ZAP: Dynamic Analysis (DAST)
  # ============================================
  zap:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: [codeql] # Дожидаемся билда, если нужно, хотя ZAP сканит живой URL
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'https://goldpc.by' # В реальности тут должен быть staging URL
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

  # ============================================
  # Security Summary
  # ============================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy, codeql, gitleaks, zap]
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy (Filesystem) | ${{ needs.trivy.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ${{ needs.codeql.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks (Secrets) | ${{ needs.gitleaks.result == 'success' && '✅ No Secrets' || '🚨 Secrets Detected' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP (DAST) | ${{ needs.zap.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 View detailed results in the **Security** tab of your repository." >> $GITHUB_STEP_SUMMARY

      - name: Fail on critical issues
        if: needs.trivy.result == 'failure' || needs.gitleaks.result == 'failure'
        run: |
          echo "::error::Critical security issues found. Please review the Security tab."
          exit 1