name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ═══════════════════════════════════════════════════════════
  # Модульные тесты бэкенда
  # ═══════════════════════════════════════════════════════════
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        working-directory: tests/backend/GoldPC.UnitTests
        run: dotnet restore
      
      - name: Build
        working-directory: tests/backend/GoldPC.UnitTests
        run: dotnet build --no-restore -c Release
      
      - name: Run Unit Tests
        working-directory: tests/backend/GoldPC.UnitTests
        run: dotnet test -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./tests/backend/GoldPC.UnitTests/coverage/*/coverage.cobertura.xml
          flags: backend-unit
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════
  # Контрактные тесты
  # ═══════════════════════════════════════════════════════════
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run Provider Contract Tests
        working-directory: tests/backend/GoldPC.ContractTests
        run: |
          dotnet restore
          dotnet test
      
      - name: Run Consumer Contract Tests
        working-directory: tests/frontend
        run: |
          npm ci
          npm run test:contract
      
      - name: Publish Pact Files
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g @pact-foundation/pact-cli
          pact-broker publish ./pacts \
            --consumer-app-version ${{ github.sha }} \
            --branch ${{ github.ref_name }} \
            --broker-url ${{ secrets.PACT_BROKER_URL }} \
            --broker-token ${{ secrets.PACT_BROKER_TOKEN }}

  # ═══════════════════════════════════════════════════════════
  # Интеграционные тесты
  # ═══════════════════════════════════════════════════════════
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: goldpc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=goldpc_test;Username=test;Password=test"
      Redis__ConnectionString: "localhost:6379"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Run Integration Tests
        working-directory: tests/backend/GoldPC.IntegrationTests
        run: |
          dotnet restore
          dotnet test -c Release

  # ═══════════════════════════════════════════════════════════
  # Модульные тесты фронтенда
  # ═══════════════════════════════════════════════════════════
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: tests/frontend
        run: npm ci
      
      - name: Run Tests
        working-directory: tests/frontend
        run: npm run test:coverage
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./tests/frontend/coverage/lcov.info
          flags: frontend-unit
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════
  # E2E тесты
  # ═══════════════════════════════════════════════════════════
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: goldpc_test
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install @playwright/test
          npx playwright install --with-deps
      
      - name: Run E2E Tests
        working-directory: tests/e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
      
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/test-results/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # Нагрузочные тесты (только для main ветки)
  # ═══════════════════════════════════════════════════════════
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [e2e-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup k6
        uses: grafana/k6-action@v0.3.0
        with:
          filename: tests/load/k6.config.js
      
      - name: Run Load Tests
        run: k6 run tests/load/k6.config.js
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}

  # ═══════════════════════════════════════════════════════════
  # Проверка покрытия кода
  # ═══════════════════════════════════════════════════════════
  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Coverage Reports
        uses: actions/download-artifact@v3
        continue-on-error: true
      
      - name: Generate Coverage Report
        run: |
          echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Coverage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Services | ≥80% | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Components | ≥70% | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Paths | ≥90% | ✅ |" >> $GITHUB_STEP_SUMMARY