name: Emergency Rollback

# =============================================================================
# Emergency Rollback Workflow for GoldPC
# Triggers manually via workflow_dispatch with version input
# Independent from main deploy process
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rollback to (e.g., sha-abc123, v1.2.3, latest)'
        required: true
        type: string
      reason:
        description: 'Reason for rollback'
        required: false
        type: string
        default: 'Emergency rollback'
      skip_health_check:
        description: 'Skip health check verification'
        required: false
        type: boolean
        default: false
      services:
        description: 'Services to rollback (comma-separated: backend,frontend,all)'
        required: false
        type: string
        default: 'all'

# =============================================================================
# Environment Variables
# =============================================================================
env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: goldpc-backend
  FRONTEND_IMAGE: goldpc-frontend
  HEALTH_CHECK_TIMEOUT: 300
  HEALTH_CHECK_INTERVAL: 10

# =============================================================================
# Permissions
# =============================================================================
permissions:
  contents: read
  packages: read
  deployments: write

jobs:
  # ===========================================================================
  # Validation: Validate input parameters
  # ===========================================================================
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      services: ${{ steps.validate.outputs.services }}
    
    steps:
      - name: Validate version format
        id: validate
        run: |
          VERSION="${{ inputs.version }}"
          
          # Validate version is not empty
          if [ -z "$VERSION" ]; then
            echo "::error::Version cannot be empty"
            exit 1
          fi
          
          # Validate version format (sha-xxx, vx.x.x, latest, or specific tag)
          if [[ ! "$VERSION" =~ ^(sha-[a-f0-9]+|v[0-9]+\.[0-9]+\.[0-9]+|latest|[a-zA-Z0-9._-]+)$ ]]; then
            echo "::warning::Version format may be non-standard: $VERSION"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "services=${{ inputs.services }}" >> $GITHUB_OUTPUT
          
          echo "## 📋 Rollback Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | \`${{ inputs.services }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | \`${{ inputs.reason }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Pull Images: Pull specified version images from Registry
  # ===========================================================================
  pull-images:
    name: Pull Images from Registry
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      backend_digest: ${{ steps.pull-backend.outputs.digest }}
      frontend_digest: ${{ steps.pull-frontend.outputs.digest }}
    
    steps:
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Determine services to pull
        id: services
        run: |
          SERVICES="${{ needs.validate.outputs.services }}"
          echo "pull_backend=false" >> $GITHUB_OUTPUT
          echo "pull_frontend=false" >> $GITHUB_OUTPUT
          
          if [ "$SERVICES" = "all" ] || [[ "$SERVICES" == *"backend"* ]]; then
            echo "pull_backend=true" >> $GITHUB_OUTPUT
          fi
          
          if [ "$SERVICES" = "all" ] || [[ "$SERVICES" == *"frontend"* ]]; then
            echo "pull_frontend=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Pull Backend Image
        id: pull-backend
        if: steps.services.outputs.pull_backend == 'true'
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:$VERSION"
          
          echo "📥 Pulling backend image: $IMAGE"
          docker pull "$IMAGE"
          
          # Get image digest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" 2>/dev/null || echo "$IMAGE")
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
          echo "::notice::Backend image pulled successfully: $DIGEST"
      
      - name: Pull Frontend Image
        id: pull-frontend
        if: steps.services.outputs.pull_frontend == 'true'
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:$VERSION"
          
          echo "📥 Pulling frontend image: $IMAGE"
          docker pull "$IMAGE"
          
          # Get image digest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" 2>/dev/null || echo "$IMAGE")
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
          echo "::notice::Frontend image pulled successfully: $DIGEST"

  # ===========================================================================
  # Rollback: Force switch Nginx to specified version
  # ===========================================================================
  rollback:
    name: Execute Rollback
    runs-on: ubuntu-latest
    needs: [validate, pull-images]
    environment: production
    outputs:
      rollback_status: ${{ steps.rollback.outputs.status }}
      health_check_result: ${{ steps.health-check.outputs.result }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy and Switch Nginx
        id: rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 300s
          command_timeout: 300s
          script: |
            set -e
            
            VERSION="${{ needs.validate.outputs.version }}"
            SERVICES="${{ needs.validate.outputs.services }}"
            REGISTRY="${{ env.REGISTRY }}"
            BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}"
            FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}"
            
            echo "🚨 Starting emergency rollback to version: $VERSION"
            echo "📅 Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "🔧 Services: $SERVICES"
            
            cd /opt/goldpc
            
            # ==========================================
            # Backup current state
            # ==========================================
            echo "📦 Creating backup of current state..."
            docker-compose ps > /tmp/pre-rollback-state.txt 2>&1 || true
            cp /etc/nginx/conf.d/default.conf /tmp/nginx-backup-$(date +%Y%m%d_%H%M%S).conf 2>/dev/null || true
            
            # ==========================================
            # Pull specified version images
            # ==========================================
            echo "📥 Pulling images from registry..."
            
            if [ "$SERVICES" = "all" ] || [[ "$SERVICES" == *"backend"* ]]; then
              echo "Pulling backend:$VERSION..."
              docker pull "$REGISTRY/$BACKEND_IMAGE:$VERSION" || {
                echo "::error::Failed to pull backend image:$VERSION"
                exit 1
              }
              docker tag "$REGISTRY/$BACKEND_IMAGE:$VERSION" "$BACKEND_IMAGE:rollback-temp"
            fi
            
            if [ "$SERVICES" = "all" ] || [[ "$SERVICES" == *"frontend"* ]]; then
              echo "Pulling frontend:$VERSION..."
              docker pull "$REGISTRY/$FRONTEND_IMAGE:$VERSION" || {
                echo "::error::Failed to pull frontend image:$VERSION"
                exit 1
              }
              docker tag "$REGISTRY/$FRONTEND_IMAGE:$VERSION" "$FRONTEND_IMAGE:rollback-temp"
            fi
            
            # ==========================================
            # Determine deployment strategy (Blue-Green)
            # ==========================================
            CURRENT_BLUE=$(docker-compose ps --services --filter "status=running" 2>/dev/null | grep -c "backend-blue" || echo "0")
            CURRENT_GREEN=$(docker-compose ps --services --filter "status=running" 2>/dev/null | grep -c "backend-green" || echo "0")
            
            if [ "$CURRENT_BLUE" -gt 0 ]; then
              CURRENT_ENV="blue"
              TARGET_ENV="green"
              CURRENT_SERVICE="backend-blue"
              TARGET_SERVICE="backend-green"
            else
              CURRENT_ENV="green"
              TARGET_ENV="blue"
              CURRENT_SERVICE="backend-green"
              TARGET_SERVICE="backend-blue"
            fi
            
            echo "📊 Current environment: $CURRENT_ENV"
            echo "🎯 Target environment: $TARGET_ENV"
            
            # ==========================================
            # Force switch Nginx to target version
            # ==========================================
            echo "🔄 Switching Nginx configuration..."
            
            # Update docker-compose with target version
            export IMAGE_TAG="$VERSION"
            export BLUE_VERSION="${{ inputs.skip_health_check == true && 'rollback-temp' || '$VERSION' }}"
            export GREEN_VERSION="$VERSION"
            
            # Stop target environment first (clean state)
            docker-compose stop "$TARGET_SERVICE" 2>/dev/null || true
            
            # Start target environment with new version
            if [ "$SERVICES" = "all" ] || [[ "$SERVICES" == *"backend"* ]]; then
              docker-compose up -d --scale "$TARGET_SERVICE=2" "$TARGET_SERVICE"
            fi
            
            if [ "$SERVICES" = "all" ] || [[ "$SERVICES" == *"frontend"* ]]; then
              docker-compose up -d frontend
            fi
            
            # Wait for containers to start
            echo "⏳ Waiting for containers to initialize..."
            sleep 10
            
            # ==========================================
            # Force Nginx to switch to target environment
            # ==========================================
            echo "🔀 Updating Nginx upstream configuration..."
            
            # Update Nginx upstream configuration
            NGINX_CONF="/etc/nginx/conf.d/default.conf"
            
            if [ -f "$NGINX_CONF" ]; then
              # Create backup before modification
              cp "$NGINX_CONF" "${NGINX_CONF}.bak"
              
              # Switch upstream based on environment
              if [ "$TARGET_ENV" = "green" ]; then
                sed -i 's/backend-blue/backend-green/g' "$NGINX_CONF"
                sed -i 's/backend_blue/backend_green/g' "$NGINX_CONF"
              else
                sed -i 's/backend-green/backend-blue/g' "$NGINX_CONF"
                sed -i 's/backend_green/backend_blue/g' "$NGINX_CONF"
              fi
              
              # Test Nginx configuration
              nginx -t || {
                echo "::error::Nginx configuration test failed"
                mv "${NGINX_CONF}.bak" "$NGINX_CONF"
                exit 1
              }
              
              # Reload Nginx gracefully
              nginx -s reload || {
                echo "::error::Failed to reload Nginx"
                exit 1
              }
              
              echo "✅ Nginx switched to $TARGET_ENV environment"
            else
              echo "::warning::Nginx configuration not found at $NGINX_CONF"
            fi
            
            # ==========================================
            # Verify traffic routing
            # ==========================================
            echo "🔍 Verifying traffic routing..."
            sleep 5
            
            # Check if traffic is flowing
            for i in {1..3}; do
              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
              if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "301" ] || [ "$RESPONSE" = "302" ]; then
                echo "Traffic verification attempt $i: OK (HTTP $RESPONSE)"
                break
              fi
              echo "Traffic verification attempt $i: Waiting... (HTTP $RESPONSE)"
              sleep 2
            done
            
            # ==========================================
            # Stop old environment (if not canary)
            # ==========================================
            if [ "$SERVICES" = "all" ]; then
              echo "🛑 Stopping old environment: $CURRENT_ENV"
              docker-compose stop "$CURRENT_SERVICE" 2>/dev/null || true
              docker-compose scale "$CURRENT_SERVICE=0" 2>/dev/null || true
            fi
            
            # Set success status
            echo "status=success" >> $GITHUB_OUTPUT
            echo "target_env=$TARGET_ENV" >> $GITHUB_OUTPUT
            
            echo "✅ Rollback deployment completed successfully!"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Health Check Verification
        id: health-check
        if: inputs.skip_health_check != true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 120s
          command_timeout: ${{ env.HEALTH_CHECK_TIMEOUT }}s
          script: |
            set -e
            
            TIMEOUT=${{ env.HEALTH_CHECK_TIMEOUT }}
            INTERVAL=${{ env.HEALTH_CHECK_INTERVAL }}
            ELAPSED=0
            
            echo "🏥 Starting health check verification..."
            
            while [ $ELAPSED -lt $TIMEOUT ]; do
              # Check backend health
              BACKEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
              
              # Check frontend (if applicable)
              FRONTEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "200")
              
              if [ "$BACKEND_HEALTH" = "200" ]; then
                echo "✅ Backend health check passed (HTTP $BACKEND_HEALTH)"
                echo "✅ All health checks passed!"
                echo "result=passed" >> $GITHUB_OUTPUT
                exit 0
              fi
              
              echo "⏳ Health check in progress... (HTTP $BACKEND_HEALTH, elapsed: ${ELAPSED}s)"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done
            
            # Health check failed
            echo "::error::Health check timed out after ${TIMEOUT}s"
            echo "result=failed" >> $GITHUB_OUTPUT
            exit 1
      
      - name: Create rollback summary
        if: always()
        run: |
          echo "## 🔄 Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Pull | ${{ needs.pull-images.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | ${{ steps.rollback.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ${{ inputs.skip_health_check == true && '⏭️ Skipped' || (steps.health-check.outcome == 'success' && '✅ Passed' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.validate.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** ${{ inputs.reason }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Notify: Send Slack notification
  # ===========================================================================
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    needs: [validate, pull-images, rollback]
    if: always()
    
    steps:
      - name: Determine notification status
        id: status
        run: |
          if [ "${{ needs.rollback.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=🚨" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ steps.status.outputs.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "title": "${{ steps.status.outputs.emoji }} Emergency Rollback - GoldPC",
                  "fields": [
                    {
                      "title": "Version",
                      "value": "${{ needs.validate.outputs.version }}",
                      "short": true
                    },
                    {
                      "title": "Status",
                      "value": "${{ steps.status.outputs.status == 'success' && 'Completed Successfully' || 'Failed' }}",
                      "short": true
                    },
                    {
                      "title": "Services",
                      "value": "${{ inputs.services }}",
                      "short": true
                    },
                    {
                      "title": "Reason",
                      "value": "${{ inputs.reason }}",
                      "short": true
                    },
                    {
                      "title": "Triggered by",
                      "value": "${{ github.actor }}",
                      "short": true
                    },
                    {
                      "title": "Workflow",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>",
                      "short": true
                    }
                  ],
                  "footer": "GoldPC Deployment System",
                  "ts": ${{ github.event.head_commit.timestamp || 'null' }}
                }
              ]
            }
          mention: ${{ steps.status.outputs.status == 'failure' && 'channel' || '' }}
          if_mention: ${{ steps.status.outputs.status == 'failure' && 'failure' || '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: env.SLACK_WEBHOOK_URL != ''

      - name: Fallback notification (no Slack webhook)
        if: env.SLACK_WEBHOOK_URL == ''
        run: |
          echo "::warning::SLACK_WEBHOOK secret not configured. Skipping Slack notification."
          echo "To enable Slack notifications, add SLACK_WEBHOOK secret to repository settings."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ===========================================================================
  # Audit Log: Record rollback for compliance
  # ===========================================================================
  audit-log:
    name: Create Audit Log Entry
    runs-on: ubuntu-latest
    needs: [validate, rollback]
    if: always()
    
    steps:
      - name: Create audit log
        run: |
          echo "## 📝 Audit Log Entry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Event Type | Emergency Rollback |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.validate.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | ${{ inputs.services }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ needs.rollback.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run URL | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
      
      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.rollback.result }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: '${{ github.run_id }}',
              state: status,
              description: `Rollback to ${{ needs.validate.outputs.version }} - ${status}`,
              environment: 'production',
              auto_inactive: false
            });
        continue-on-error: true