        auto_inject: true
    
    context_limits:
      max_tokens: 20000
      priority_order:
        - "contracts"
        - "patterns"
        - "lessons_learned"

  # ─────────────────────────────────────────────────────────────────────────────
  # АГЕНТ D: QA Engineer
  # ─────────────────────────────────────────────────────────────────────────────
  agent_d:
    role: "QA Engineer"
    tier: "TIER-3"
    description: "Инженер по тестированию и обеспечению качества"
    
    modules:
      - "tests"
      - "integration"
      - "e2e"
    
    responsibilities:
      - "Unit тесты для всех модулей"
      - "Integration тесты"
      - "E2E тесты (Playwright)"
      - "Нагрузочные тесты"
      - "Pact контрактные тесты"
    
    injected_knowledge:
      patterns:
        - path: "patterns/testing-strategies.md"
          priority: "high"
          description: "Стратегии тестирования для микросервисов"
        - path: "patterns/pact-testing.md"
          priority: "high"
          description: "Pact контрактное тестирование"
        - path: "patterns/react-best-practices.md"
          priority: "medium"
          description: "Тестирование React компонентов"
        - path: "patterns/repository-pattern.md"
          priority: "medium"
          description: "Тестирование репозиториев (mocking)"
      contracts:
        - path: "contracts/openapi/"
          priority: "high"
          description: "Все OpenAPI спецификации"
        - path: "contracts/pacts/"
          priority: "high"
          description: "Pact контракты"
      lessons_learned:
        path: "lessons-learned/testing/"
        auto_inject: true
    
    context_limits:
      max_tokens: 15000
      priority_order:
        - "contracts"
        - "patterns"
        - "lessons_learned"

  # ─────────────────────────────────────────────────────────────────────────────
  # КООРДИНАТОР: Agent Coordinator
  # ─────────────────────────────────────────────────────────────────────────────
  coordinator:
    role: "Agent Coordinator"
    tier: "TIER-1"
    description: "Координатор команды агентов, архитектор"
    
    modules:
      - "all"
    
    responsibilities:
      - "Координация работы агентов"
      - "Архитектурные ревью"
      - "Разрешение конфликтов"
      - "Управление контрактами"
      - "Code review"
    
    injected_knowledge:
      patterns:
        - path: "patterns/repository-pattern.md"
          priority: "medium"
        - path: "patterns/react-best-practices.md"
          priority: "medium"
        - path: "patterns/cqrs.md"
          priority: "medium"
        - path: "patterns/domain-events.md"
          priority: "medium"
        - path: "patterns/saga.md"
          priority: "medium"
      contracts:
        - path: "contracts/openapi/"
          priority: "high"
        - path: "contracts/asyncapi/"
          priority: "high"
      architecture:
        - path: "architecture/c4/"
          priority: "high"
        - path: "architecture/adr/"
          priority: "high"
      lessons_learned:
        path: "lessons-learned/"
        auto_inject: true
    
    context_limits:
      max_tokens: 30000
      priority_order:
        - "architecture"
        - "contracts"
        - "patterns"
        - "lessons_learned"

# ═══════════════════════════════════════════════════════════════════════════════
# КОНФИГУРАЦИЯ БАЗЫ ЗНАНИЙ
# ═══════════════════════════════════════════════════════════════════════════════

knowledge_base:
  root_path: "knowledge-base/"
  
  categories:
    patterns:
      path: "patterns/"
      description: "Паттерны проектирования и best practices"
      file_types:
        - "*.md"
    
    contracts:
      path: "contracts/"
      description: "API контракты (OpenAPI, AsyncAPI, Pact)"
      file_types:
        - "*.yaml"
        - "*.json"
    
    lessons_learned:
      path: "lessons-learned/"
      description: "Уроки, извлечённые из разработки"
      file_types:
        - "*.md"
      structure:
        - "frontend/"
        - "backend/"
        - "testing/"
        - "devops/"
    
    architecture:
      path: "architecture/"
      description: "Архитектурные документы"
      file_types:
        - "*.md"
        - "*.mmd"

# ═══════════════════════════════════════════════════════════════════════════════
# НАСТРОЙКИ ИНЪЕКЦИИ
# ═══════════════════════════════════════════════════════════════════════════════

injection_settings:
  # Автоматическое обновление при изменении файлов
  auto_reload: true
  
  # Кэширование загруженных документов
  cache_enabled: true
  cache_ttl_minutes: 60
  
  # Приоритет внедрения при превышении лимита токенов
  overflow_strategy: "priority_cutoff"
  
  # Формат внедрения
  format:
    include_metadata: true
    include_toc: true
    highlight_critical_sections: true
  
  # Метаданные для каждого документа
  metadata_template: |
    ---
    Document: {filename}
    Category: {category}
    Priority: {priority}
    Last Updated: {last_updated}
    Injected to: {agent_id}
    ---

# ═══════════════════════════════════════════════════════════════════════════════
# ПРАВИЛА ОБНОВЛЕНИЯ
# ═══════════════════════════════════════════════════════════════════════════════

update_rules:
  # При обновлении контракта
  on_contract_change:
    notify_agents:
      - "{all_dependent_agents}"
    action: "reload_context"
    priority: "immediate"
  
  # При добавлении нового урока
  on_lesson_learned:
    notify_agents:
      - "{agents_in_category}"
    action: "append_to_context"
    priority: "next_session"
  
  # При обновлении паттерна
  on_pattern_update:
    notify_agents:
      - "{all_agents}"
    action: "reload_context"
    priority: "high"

# ═══════════════════════════════════════════════════════════════════════════════
# ВАЛИДАЦИЯ
# ═══════════════════════════════════════════════════════════════════════════════

validation:
  # Проверка существования файлов перед внедрением
  check_file_exists: true
  
  # Проверка формата документов
  validate_format: true
  
  # Максимальный размер файла (KB)
  max_file_size_kb: 500
  
  # Поддерживаемые форматы
  supported_formats:
    - ".md"
    - ".yaml"
    - ".json"
    - ".mmd"