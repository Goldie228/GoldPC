# Knowledge Injection Configuration
# Конфигурация внедрения базы знаний в контекст ИИ-агентов
# Проект GoldPC

version: "1.0"
last_updated: "2026-03-15"

# ═══════════════════════════════════════════════════════════════════════════════
# АГЕНТЫ
# ═══════════════════════════════════════════════════════════════════════════════

agents:
  # ─────────────────────────────────────────────────────────────────────────────
  # АГЕНТ A: Frontend Developer
  # ─────────────────────────────────────────────────────────────────────────────
  agent_a:
    role: "Frontend Developer"
    tier: "TIER-2"
    description: "Разработчик пользовательского интерфейса на React + TypeScript"
    
    modules:
      - "catalog-ui"
      - "pc-builder-ui"
      - "orders-ui"
      - "services-ui"
      - "admin-ui"
    
    responsibilities:
      - "Разработка React компонентов"
      - "Интеграция с Backend API"
      - "Управление состоянием приложения"
      - "E2E тестирование UI"
    
    injected_knowledge:
      patterns:
        - path: "patterns/react-best-practices.md"
          priority: "high"
          description: "React hooks и компоненты: правила использования"
        - path: "patterns/mui-components.md"
          priority: "medium"
          description: "Material UI компоненты и стилизация"
      contracts:
        - path: "contracts/openapi/catalog.yaml"
          priority: "high"
          description: "Catalog API спецификация"
        - path: "contracts/openapi/orders.yaml"
          priority: "high"
          description: "Orders API спецификация"
        - path: "contracts/openapi/auth.yaml"
          priority: "high"
          description: "Auth API спецификация"
        - path: "contracts/openapi/pc-builder.yaml"
          priority: "medium"
          description: "PC Builder API спецификация"
      lessons_learned:
        path: "lessons-learned/frontend/"
        auto_inject: true
    
    context_limits:
      max_tokens: 15000
      priority_order:
        - "contracts"
        - "patterns"
        - "lessons_learned"

  # ─────────────────────────────────────────────────────────────────────────────
  # АГЕНТ B: Backend Core Developer
  # ─────────────────────────────────────────────────────────────────────────────
  agent_b:
    role: "Backend Core Developer"
    tier: "TIER-2"
    description: "Разработчик core-сервисов на C# / ASP.NET Core"
    
    modules:
      - "auth"
      - "catalog"
      - "pc-builder"
      - "admin"
    
    responsibilities:
      - "Разработка Auth API"
      - "Разработка Catalog API"
      - "Разработка PC Builder API"
      - "Безопасность и авторизация"
      - "Code review backend компонентов"
    
    injected_knowledge:
      patterns:
        - path: "patterns/repository-pattern.md"
          priority: "high"
          description: "Generic Repository pattern для доступа к данным"
        - path: "patterns/cqrs.md"
          priority: "medium"
          description: "CQRS паттерн для разделения read/write операций"
        - path: "patterns/domain-events.md"
          priority: "medium"
          description: "Domain Events для слабосвязанной коммуникации"
      contracts:
        - path: "contracts/openapi/auth.yaml"
          priority: "high"
          description: "Auth API спецификация (owner)"
        - path: "contracts/openapi/catalog.yaml"
          priority: "high"
          description: "Catalog API спецификация (owner)"
        - path: "contracts/openapi/pc-builder.yaml"
          priority: "high"
          description: "PC Builder API спецификация (owner)"
      lessons_learned:
        path: "lessons-learned/backend/"
        auto_inject: true
    
    context_limits:
      max_tokens: 20000
      priority_order:
        - "contracts"
        - "patterns"
        - "lessons_learned"

  # ─────────────────────────────────────────────────────────────────────────────
  # АГЕНТ C: Backend Services Developer
  # ─────────────────────────────────────────────────────────────────────────────
  agent_c:
    role: "Backend Services Developer"
    tier: "TIER-2"
    description: "Разработчик бизнес-сервисов и доменной логики"
    
    modules:
      - "orders"
      - "services"
      - "warranty"
    
    responsibilities:
      - "Разработка Orders API"
      - "Разработка Services API"
      - "Разработка Warranty API"
      - "Бизнес-логика заказов"
      - "Domain Events публикация"
    
    injected_knowledge:
      patterns:
        - path: "patterns/repository-pattern.md"
          priority: "high"
          description: "Generic Repository pattern для доступа к данным"
        - path: "patterns/domain-events.md"
          priority: "high"
          description: "Domain Events — основной механизм коммуникации"
        - path: "patterns/saga.md"
          priority: "high"
          description: "Saga паттерн для распределённых транзакций"
        - path: "patterns/outbox.md"
          priority: "medium"
          description: "Outbox pattern для надёжной доставки событий"
      contracts:
        - path: "contracts/openapi/orders.yaml"
          priority: "high"
          description: "Orders API спецификация (owner)"
        - path: "contracts/openapi/services.yaml"
          priority: "high"
          description: "Services API спецификация (owner)"
        - path: "contracts/asyncapi/events.yaml"
