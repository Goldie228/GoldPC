<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ошибка — GoldPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --bg-elevated: #121214;
      --bg-card: #18181b;
      --fg: #fafafa;
      --fg-muted: #71717a;
      --fg-dim: #52525b;
      --accent: #d4a574;
      --accent-bright: #e8c4a0;
      --accent-glow: rgba(212, 165, 116, 0.15);
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(212, 165, 116, 0.2);
      --radius: 4px;
      --radius-lg: 8px;
      --error: #ef4444;
      --error-glow: rgba(239, 68, 68, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .error-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .error-icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--error-glow);
      border: 1px solid rgba(239, 68, 68, 0.2);
      margin: 0 auto 24px;
    }

    .error-icon svg {
      width: 28px;
      height: 28px;
      color: var(--error);
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .error-message {
      font-size: 0.9rem;
      color: var(--fg-muted);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--fg-dim);
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: var(--accent-bright);
    }

    .btn-primary svg {
      width: 16px;
      height: 16px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--fg-muted);
      border: 1px solid var(--border);
      margin-top: 12px;
    }

    .btn-ghost:hover {
      border-color: var(--fg-dim);
      color: var(--fg);
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @media (max-width: 480px) {
      .error-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <h1 class="error-title">Произошла ошибка</h1>
    <p class="error-message">
      Что-то пошло не так при обработке вашего запроса. 
      Пожалуйста, попробуйте позже или обратитесь в службу поддержки.
    </p>
    <div class="error-code">Error ID: ERR_20260317_001</div>
    <div class="actions">
      <a href="home.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <polyline points="9 18 3 12 9 6"/>
        </svg>
        Вернуться на главную
      </a>
      <a href="#" class="btn btn-ghost">Сообщить о проблеме</a>
    </div>
  </div>
</body>
</html>
</task_progress>
