<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экспорт данных — GoldPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --bg-elevated: #121214;
      --bg-card: #18181b;
      --fg: #fafafa;
      --fg-muted: #71717a;
      --fg-dim: #52525b;
      --accent: #d4a574;
      --accent-bright: #e8c4a0;
      --accent-glow: rgba(212, 165, 116, 0.15);
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(212, 165, 116, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(9, 9, 11, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 20px; height: 20px; color: var(--bg); }

    .logo-text { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.02em; color: var(--fg); }
    .logo-text span { color: var(--accent); }

    .header-user { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 0.85rem; color: var(--fg-muted); }

    .user-avatar {
      width: 36px; height: 36px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .layout { display: flex; padding-top: 68px; min-height: 100vh; }

    .sidebar {
      width: 240px;
      background: var(--bg-elevated);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: fixed;
      top: 68px; bottom: 0; left: 0;
    }

    .sidebar-section { margin-bottom: 24px; }

    .sidebar-title {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--fg-dim);
      padding: 0 20px;
      margin-bottom: 8px;
    }

    .sidebar-nav { list-style: none; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      font-size: 0.85rem;
      color: var(--fg-muted);
      text-decoration: none;
      transition: all 0.2s;
      border-left: 2px solid transparent;
    }

    .sidebar-nav a:hover { color: var(--fg); background: rgba(255, 255, 255, 0.02); }
    .sidebar-nav a.active { color: var(--accent); background: var(--accent-glow); border-left-color: var(--accent); }
    .sidebar-nav svg { width: 18px; height: 18px; }

    .main { flex: 1; margin-left: 240px; padding: 32px; max-width: 800px; }

    .page-header { margin-bottom: 32px; }

    .page-title {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .page-subtitle { font-size: 0.9rem; color: var(--fg-muted); }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .card-title svg { width: 18px; height: 18px; color: var(--accent); }

    /* Export Options */
    .export-option {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .export-option:hover { border-color: var(--border-accent); }
    .export-option.selected { border-color: var(--accent); background: var(--accent-glow); }

    .export-radio {
      position: relative;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .export-radio input { opacity: 0; position: absolute; cursor: pointer; }

    .radio-mark {
      position: absolute;
      inset: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50%;
    }

    .radio-mark::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.2s;
    }

    .export-radio input:checked + .radio-mark::after { transform: translate(-50%, -50%) scale(1); }
    .export-radio input:checked + .radio-mark { border-color: var(--accent); }

    .export-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      color: var(--fg-dim);
      flex-shrink: 0;
    }

    .export-option.selected .export-icon { color: var(--accent); }
    .export-icon svg { width: 20px; height: 20px; }

    .export-info { flex: 1; }
    .export-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
    .export-desc { font-size: 0.8rem; color: var(--fg-muted); }

    /* Checkboxes */
    .checkbox-group { margin-top: 24px; }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .checkbox-item:last-child { border-bottom: none; }

    .checkbox {
      position: relative;
      width: 18px;
      height: 18px;
    }

    .checkbox input { opacity: 0; position: absolute; cursor: pointer; }

    .checkbox-mark {
      position: absolute;
      inset: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    .checkbox-mark::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid var(--bg);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) scale(0);
      transition: transform 0.2s;
    }

    .checkbox input:checked + .checkbox-mark { background: var(--accent); border-color: var(--accent); }
    .checkbox input:checked + .checkbox-mark::after { transform: rotate(45deg) scale(1); }

    .checkbox-label { font-size: 0.85rem; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: var(--accent-bright); }
    .btn-primary svg { width: 16px; height: 16px; }

    .btn-ghost {
      background: transparent;
      color: var(--fg-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--fg-dim); color: var(--fg); }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="home.html" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <span class="logo-text">Gold<span>PC</span></span>
    </a>
    <div class="header-user">
      <span class="user-name">Бухгалтер</span>
      <div class="user-avatar">Б</div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Финансы</div>
        <ul class="sidebar-nav">
          <li>
            <a href="accountant-reports.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
              Отчёты
            </a>
          </li>
          <li>
            <a href="accountant-services.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
              Услуги
            </a>
          </li>
          <li>
            <a href="accountant-export.html" class="active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Экспорт
            </a>
          </li>
        </ul>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">Экспорт данных</h1>
        <p class="page-subtitle">Выберите формат и данные для экспорта</p>
      </div>

      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Формат экспорта
        </div>

        <label class="export-option selected">
          <div class="export-radio">
            <input type="radio" name="format" checked>
            <span class="radio-mark"></span>
          </div>
          <div class="export-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <div class="export-info">
            <div class="export-name">CSV</div>
            <div class="export-desc">Таблица с разделителями, открывается в Excel</div>
          </div>
        </label>

        <label class="export-option">
          <div class="export-radio">
            <input type="radio" name="format">
            <span class="radio-mark"></span>
          </div>
          <div class="export-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div class="export-info">
            <div class="export-name">Excel (.xlsx)</div>
            <div class="export-desc">Формат Microsoft Excel с форматированием</div>
          </div>
        </label>

        <label class="export-option">
          <div class="export-radio">
            <input type="radio" name="format">
            <span class="radio-mark"></span>
          </div>
          <div class="export-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <path d="M9 15l2 2 4-4"/>
            </svg>
          </div>
          <div class="export-info">
            <div class="export-name">PDF</div>
            <div class="export-desc">Документ для печати и архивации</div>
          </div>
        </label>
      </div>

      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
          Данные для экспорта
        </div>

        <div class="checkbox-group">
          <label class="checkbox-item">
            <div class="checkbox">
              <input type="checkbox" checked>
              <span class="checkbox-mark"></span>
            </div>
            <span class="checkbox-label">Заказы</span>
          </label>

          <label class="checkbox-item">
            <div class="checkbox">
              <input type="checkbox" checked>
              <span class="checkbox-mark"></span>
            </div>
            <span class="checkbox-label">Оказанные услуги</span>
          </label>

          <label class="checkbox-item">
            <div class="checkbox">
              <input type="checkbox">
              <span class="checkbox-mark"></span>
            </div>
            <span class="checkbox-label">Возвраты</span>
          </label>

          <label class="checkbox-item">
            <div class="checkbox">
              <input type="checkbox">
              <span class="checkbox-mark"></span>
            </div>
            <span class="checkbox-label">Складские остатки</span>
          </label>

          <label class="checkbox-item">
            <div class="checkbox">
              <input type="checkbox">
              <span class="checkbox-mark"></span>
            </div>
            <span class="checkbox-label">Клиенты</span>
          </label>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Экспортировать
          </button>
          <button class="btn btn-ghost">Отмена</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
