<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена — GoldPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --bg-elevated: #121214;
      --bg-card: #18181b;
      --fg: #fafafa;
      --fg-muted: #71717a;
      --fg-dim: #52525b;
      --accent: #d4a574;
      --accent-bright: #e8c4a0;
      --accent-glow: rgba(212, 165, 116, 0.15);
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(212, 165, 116, 0.2);
      --radius: 4px;
      --radius-lg: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(9, 9, 11, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      color: var(--bg);
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      border-color: var(--border-accent);
      color: var(--accent);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 68px 24px 40px;
      position: relative;
      overflow: hidden;
    }

    .bg-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
      opacity: 0.5;
    }

    .content {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(8rem, 25vw, 16rem);
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.05em;
      margin-bottom: 24px;
      text-shadow: 0 0 120px var(--accent-glow);
    }

    .error-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .error-text {
      font-size: 0.95rem;
      color: var(--fg-muted);
      max-width: 400px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: var(--accent-bright);
      transform: translateY(-2px);
    }

    .btn-primary svg {
      width: 16px;
      height: 16px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      margin-left: 12px;
    }

    .btn-ghost:hover {
      border-color: var(--fg-dim);
      background: var(--bg-card);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Footer */
    .footer {
      padding: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .footer-text {
      font-size: 0.75rem;
      color: var(--fg-dim);
    }

    .footer-text a {
      color: var(--fg-muted);
      text-decoration: none;
    }

    .footer-text a:hover {
      color: var(--accent);
    }

    @media (max-width: 768px) {
      .actions {
        flex-direction: column;
        align-items: center;
      }

      .btn-ghost {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="home.html" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <span class="logo-text">Gold<span>PC</span></span>
    </a>
    <div class="header-actions">
      <button class="icon-btn" aria-label="Поиск">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="Корзина">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="bg-pattern"></div>
    <div class="content">
      <div class="error-code">404</div>
      <h1 class="error-title">Страница не найдена</h1>
      <p class="error-text">
        Кажется, запрашиваемая страница была перемещена или больше не существует. 
        Проверьте URL или вернитесь на главную.
      </p>
      <div class="actions">
        <a href="home.html" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <polyline points="9 18 3 12 9 6"/>
          </svg>
          На главную
        </a>
        <a href="catalog.html" class="btn btn-ghost">Каталог</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer-text">
      Нужна помощь? <a href="#">Свяжитесь с нами</a>
    </p>
  </footer>
</body>
</html>
</task_progress>
