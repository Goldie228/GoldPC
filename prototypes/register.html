<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — GoldPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --bg-elevated: #121214;
      --bg-card: #18181b;
      --fg: #fafafa;
      --fg-muted: #71717a;
      --fg-dim: #52525b;
      --accent: #d4a574;
      --accent-bright: #e8c4a0;
      --accent-glow: rgba(212, 165, 116, 0.15);
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(212, 165, 116, 0.2);
      --error: #ef4444;
      --success: #22c55e;
      --radius: 4px;
      --radius-lg: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-feature-settings: 'ss01' on;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 40px;
      position: relative;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
      color: var(--bg);
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .logo-text span {
      color: var(--accent);
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .auth-subtitle {
      font-size: 0.85rem;
      color: var(--fg-muted);
      text-align: center;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .form-input::placeholder {
      color: var(--fg-dim);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg);
    }

    .form-input:hover:not(:focus) {
      border-color: var(--border-accent);
    }

    .form-hint {
      font-size: 0.7rem;
      color: var(--fg-dim);
      margin-top: 6px;
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 20px 0;
    }

    .checkbox-input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .checkbox-label {
      font-size: 0.8rem;
      color: var(--fg-muted);
      cursor: pointer;
      line-height: 1.5;
    }

    .checkbox-label a {
      color: var(--accent);
      text-decoration: none;
    }

    .checkbox-label a:hover {
      color: var(--accent-bright);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: var(--accent-bright);
      transform: translateY(-2px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 0.7rem;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .auth-footer {
      text-align: center;
    }

    .auth-footer-text {
      font-size: 0.85rem;
      color: var(--fg-muted);
    }

    .auth-footer-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .auth-footer-link:hover {
      color: var(--accent-bright);
    }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--fg-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--fg);
    }

    .back-link svg {
      width: 14px;
      height: 14px;
    }

    /* Background decoration */
    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
      top: -200px;
      left: -150px;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
    }

    /* Focus visible */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 24px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="auth-container">
    <div class="auth-card">
      <a href="home.html" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
        </div>
        <span class="logo-text">Gold<span>PC</span></span>
      </a>

      <h1 class="auth-title">Создать аккаунт</h1>
      <p class="auth-subtitle">Заполните форму для регистрации</p>

      <form action="#" method="POST">
        <div class="form-group">
          <label class="form-label" for="name">Имя</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            class="form-input" 
            placeholder="Ваше имя"
            required
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="your@email.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Пароль</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Минимум 8 символов"
            required
            minlength="8"
            autocomplete="new-password"
          >
          <p class="form-hint">Минимум 8 символов, буквы и цифры</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Подтверждение пароля</label>
          <input 
            type="password" 
            id="confirm-password" 
            name="confirm-password" 
            class="form-input" 
            placeholder="Повторите пароль"
            required
            autocomplete="new-password"
          >
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" name="terms" class="checkbox-input" required>
          <label for="terms" class="checkbox-label">
            Я принимаю <a href="#">условия использования</a> и <a href="#">политику конфиденциальности</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary">
          Зарегистрироваться
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <div class="auth-divider">
        <div class="divider-line"></div>
        <span class="divider-text">или</span>
        <div class="divider-line"></div>
      </div>

      <div class="auth-footer">
        <p class="auth-footer-text">
          Уже есть аккаунт? <a href="login.html" class="auth-footer-link">Войти</a>
        </p>
      </div>
    </div>

    <a href="home.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Вернуться на главную
    </a>
  </div>
</body>
</html>
