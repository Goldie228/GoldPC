<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отчёты — GoldPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --bg-elevated: #121214;
      --bg-card: #18181b;
      --fg: #fafafa;
      --fg-muted: #71717a;
      --fg-dim: #52525b;
      --accent: #d4a574;
      --accent-bright: #e8c4a0;
      --accent-glow: rgba(212, 165, 116, 0.15);
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(212, 165, 116, 0.2);
      --radius: 4px;
      --radius-lg: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(9, 9, 11, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      color: var(--bg);
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-name {
      font-size: 0.85rem;
      color: var(--fg-muted);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* Layout */
    .layout {
      display: flex;
      padding-top: 68px;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: var(--bg-elevated);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: fixed;
      top: 68px;
      bottom: 0;
      left: 0;
    }

    .sidebar-section {
      margin-bottom: 24px;
    }

    .sidebar-title {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--fg-dim);
      padding: 0 20px;
      margin-bottom: 8px;
    }

    .sidebar-nav {
      list-style: none;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      font-size: 0.85rem;
      color: var(--fg-muted);
      text-decoration: none;
      transition: all 0.2s;
      border-left: 2px solid transparent;
    }

    .sidebar-nav a:hover {
      color: var(--fg);
      background: rgba(255, 255, 255, 0.02);
    }

    .sidebar-nav a.active {
      color: var(--accent);
      background: var(--accent-glow);
      border-left-color: var(--accent);
    }

    .sidebar-nav svg {
      width: 18px;
      height: 18px;
    }

    /* Main Content */
    .main {
      flex: 1;
      margin-left: 240px;
      padding: 32px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 0.9rem;
      color: var(--fg-muted);
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
    }

    /* Form Elements */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--fg-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: var(--accent-bright);
      transform: translateY(-2px);
    }

    .btn-primary svg {
      width: 16px;
      height: 16px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--fg-dim);
      background: var(--bg-card);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 20px;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 500;
    }

    .stat-value.accent {
      color: var(--accent);
    }

    @media (max-width: 1024px) {
      .sidebar {
        display: none;
      }
      .main {
        margin-left: 0;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="home.html" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <span class="logo-text">Gold<span>PC</span></span>
    </a>
    <div class="header-user">
      <span class="user-name">Бухгалтер</span>
      <div class="user-avatar">Б</div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Финансы</div>
        <ul class="sidebar-nav">
          <li>
            <a href="accountant-reports.html" class="active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
              Отчёты
            </a>
          </li>
          <li>
            <a href="accountant-services.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
              Услуги
            </a>
          </li>
          <li>
            <a href="accountant-export.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Экспорт
            </a>
          </li>
        </ul>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">Финансовые отчёты</h1>
        <p class="page-subtitle">Формирование отчётов за выбранный период</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Выручка за месяц</div>
          <div class="stat-value accent">45 230 BYN</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Заказов</div>
          <div class="stat-value">128</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Средний чек</div>
          <div class="stat-value">353 BYN</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Услуг оказано</div>
          <div class="stat-value">47</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Период отчёта
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Дата начала</label>
            <input type="date" class="form-input" value="2026-01-01">
          </div>
          <div class="form-group">
            <label class="form-label">Дата окончания</label>
            <input type="date" class="form-input" value="2026-03-17">
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Экспорт
          </button>
          <button class="btn btn-ghost">Предпросмотр</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
