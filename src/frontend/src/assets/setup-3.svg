<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0e11"/>
      <stop offset="100%" stop-color="#1a1f27"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="800" cy="500" r="400" fill="#FCD535" opacity="0.02"/>
  <!-- Laptop -->
  <rect x="400" y="200" width="800" height="120" rx="12" fill="#1e2329" stroke="#2b3139" stroke-width="2"/>
  <rect x="420" y="220" width="760" height="80" rx="6" fill="#0b0e11"/>
  <rect x="440" y="230" width="720" height="60" rx="4" fill="#FCD535" opacity="0.03"/>
  <!-- Laptop base -->
  <path d="M350,500 L400,200 L1200,200 L1250,500 Z" fill="#1e2329" stroke="#2b3139" stroke-width="2"/>
  <rect x="400" y="480" width="800" height="20" rx="4" fill="#1e2329"/>
  <!-- Trackpad -->
  <rect x="700" y="530" width="200" height="120" rx="8" fill="#1e2329" stroke="#2b3139" stroke-width="1"/>
  <rect x="720" y="550" width="160" height="80" rx="4" fill="#0b0e11"/>
  <!-- Coffee cup -->
  <rect x="1350" y="420" width="60" height="80" rx="8" fill="#1e2329" stroke="#2b3139" stroke-width="1.5"/>
  <ellipse cx="1380" cy="420" rx="30" ry="8" fill="#2b3139"/>
  <ellipse cx="1380" cy="420" rx="26" ry="5" fill="#0b0e11"/>
  <!-- Steam lines -->
  <line x1="1380" y1="400" x2="1380" y2="370" stroke="#2b3139" stroke-width="1.5" opacity="0.3"/>
  <line x1="1360" y1="405" x2="1355" y2="375" stroke="#2b3139" stroke-width="1" opacity="0.2"/>
  <line x1="1400" y1="405" x2="1405" y2="375" stroke="#2b3139" stroke-width="1" opacity="0.2"/>
  <!-- Plant -->
  <rect x="200" y="550" width="80" height="120" rx="6" fill="#1e2329"/>
  <ellipse cx="240" cy="540" rx="45" ry="30" fill="#2b3139"/>
  <ellipse cx="225" cy="530" rx="20" ry="15" fill="#1e2329"/>
  <ellipse cx="255" cy="535" rx="18" ry="12" fill="#1e2329"/>
  <!-- Text -->
  <text x="800" y="920" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#707a8a">Домашний офис</text>
</svg>