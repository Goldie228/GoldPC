<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" rx="12" fill="#1e2329"/>
  <g stroke="#FCD535" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- PC Case -->
    <rect x="220" y="120" width="160" height="140" rx="8" stroke-width="2.5"/>
    <rect x="235" y="135" width="55" height="20" rx="3"/>
    <rect x="235" y="165" width="55" height="20" rx="3"/>
    <rect x="235" y="195" width="55" height="20" rx="3"/>
    <rect x="310" y="170" width="55" height="70" rx="3" stroke-width="1.5"/>
    <circle cx="337" cy="205" r="15"/>
    <rect x="235" y="230" width="130" height="15" rx="3"/>
    <!-- Monitor -->
    <rect x="165" y="95" width="80" height="55" rx="4" stroke-width="2" stroke="#707a8a"/>
    <line x1="205" y1="150" x2="205" y2="160" stroke="#707a8a"/>
    <rect x="195" y="160" width="20" height="8" rx="2" fill="#FCD535" stroke="none"/>
    <!-- Monitor 2 -->
    <rect x="355" y="95" width="80" height="55" rx="4" stroke-width="2" stroke="#707a8a"/>
    <line x1="395" y1="150" x2="395" y2="160" stroke="#707a8a"/>
    <rect x="385" y="160" width="20" height="8" rx="2" fill="#FCD535" stroke="none"/>
    <!-- Keyboard -->
    <rect x="235" y="270" width="130" height="40" rx="4" stroke-width="1.5"/>
    <line x1="245" y1="280" x2="245" y2="300"/>
    <line x1="260" y1="280" x2="260" y2="300"/>
    <line x1="275" y1="280" x2="275" y2="300"/>
    <line x1="290" y1="280" x2="290" y2="300"/>
    <line x1="305" y1="280" x2="305" y2="300"/>
    <line x1="320" y1="280" x2="320" y2="300"/>
    <line x1="335" y1="280" x2="335" y2="300"/>
    <line x1="350" y1="280" x2="350" y2="300"/>
    <!-- GPU glow -->
    <rect x="255" y="208" width="35" height="18" rx="2" fill="#FCD535" fill-opacity="0.15" stroke="#FCD535" stroke-width="1"/>
    <text x="272" y="221" text-anchor="middle" fill="#FCD535" font-family="Inter,sans-serif" font-size="7" font-weight="600">GPU</text>
    <!-- Shapes around -->
    <circle cx="100" cy="200" r="40" stroke="#FCD535" stroke-opacity="0.2"/>
    <circle cx="100" cy="200" r="25" stroke="#FCD535" stroke-opacity="0.15"/>
    <circle cx="500" cy="200" r="40" stroke="#FCD535" stroke-opacity="0.2"/>
    <circle cx="500" cy="200" r="25" stroke="#FCD535" stroke-opacity="0.15"/>
  </g>
  <text x="300" y="350" text-anchor="middle" fill="#707a8a" font-family="Inter,sans-serif" font-size="13">GoldPC — команда профессионалов</text>
  <text x="300" y="370" text-anchor="middle" fill="#3a3f47" font-family="Inter,sans-serif" font-size="10">Разработчик: Кажуро Глеб, группа Т-393</text>
</svg>
