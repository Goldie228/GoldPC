<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <pattern id="circuit" patternUnits="userSpaceOnUse" width="40" height="40">
      <!-- Grid base -->
      <rect width="40" height="40" fill="#09090b"/>
      <!-- Circuit traces -->
      <path d="M0 20h15M25 20h15" stroke="#1a1a1f" stroke-width="1"/>
      <path d="M20 0v15M20 25v15" stroke="#1a1a1f" stroke-width="1"/>
      <!-- Connection nodes -->
      <circle cx="20" cy="20" r="3" fill="#18181b" stroke="#27272a" stroke-width="1"/>
      <!-- Corner nodes -->
      <circle cx="0" cy="0" r="2" fill="#18181b"/>
      <circle cx="40" cy="0" r="2" fill="#18181b"/>
      <circle cx="0" cy="40" r="2" fill="#18181b"/>
      <circle cx="40" cy="40" r="2" fill="#18181b"/>
      <!-- Diagonal traces -->
      <path d="M5 5l10 10M35 5l-10 10M5 35l10-10M35 35l-10-10" stroke="#1a1a1f" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#d4a574" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Background with circuit pattern -->
  <rect width="400" height="400" fill="url(#circuit)"/>
  
  <!-- Subtle gold overlay -->
  <rect width="400" height="400" fill="url(#goldAccent)"/>
  
  <!-- Central processor chip -->
  <g transform="translate(140, 140)">
    <!-- Chip body -->
    <rect x="20" y="20" width="80" height="80" rx="8" fill="#18181b" stroke="#27272a" stroke-width="2"/>
    
    <!-- Inner die -->
    <rect x="35" y="35" width="50" height="50" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    
    <!-- Die pattern -->
    <rect x="45" y="45" width="30" height="30" rx="2" fill="none" stroke="#27272a" stroke-width="0.5"/>
    <line x1="60" y1="45" x2="60" y2="75" stroke="#27272a" stroke-width="0.5"/>
    <line x1="45" y1="60" x2="75" y2="60" stroke="#27272a" stroke-width="0.5"/>
    
    <!-- Pins - top -->
    <rect x="30" y="5" width="6" height="15" rx="1" fill="#27272a"/>
    <rect x="45" y="5" width="6" height="15" rx="1" fill="#27272a"/>
    <rect x="60" y="5" width="6" height="15" rx="1" fill="#27272a"/>
    <rect x="75" y="5" width="6" height="15" rx="1" fill="#27272a"/>
    <rect x="90" y="5" width="6" height="15" rx="1" fill="#27272a"/>
    
    <!-- Pins - bottom -->
    <rect x="30" y="100" width="6" height="15" rx="1" fill="#27272a"/>
    <rect x="45" y="100" width="6" height="15" rx="1" fill="#27272a"/>
    <rect x="60" y="100" width="6" height="15" rx="1" fill="#27272a"/>
    <rect x="75" y="100" width="6" height="15" rx="1" fill="#27272a"/>
    <rect x="90" y="100" width="6" height="15" rx="1" fill="#27272a"/>
    
    <!-- Pins - left -->
    <rect x="5" y="30" width="15" height="6" rx="1" fill="#27272a"/>
    <rect x="5" y="45" width="15" height="6" rx="1" fill="#27272a"/>
    <rect x="5" y="60" width="15" height="6" rx="1" fill="#27272a"/>
    <rect x="5" y="75" width="15" height="6" rx="1" fill="#27272a"/>
    <rect x="5" y="90" width="15" height="6" rx="1" fill="#27272a"/>
    
    <!-- Pins - right -->
    <rect x="100" y="30" width="15" height="6" rx="1" fill="#27272a"/>
    <rect x="100" y="45" width="15" height="6" rx="1" fill="#27272a"/>
    <rect x="100" y="60" width="15" height="6" rx="1" fill="#27272a"/>
    <rect x="100" y="75" width="15" height="6" rx="1" fill="#27272a"/>
    <rect x="100" y="90" width="15" height="6" rx="1" fill="#27272a"/>
    
    <!-- Gold accent corners -->
    <circle cx="40" cy="40" r="3" fill="#d4a574" fill-opacity="0.3"/>
    <circle cx="80" cy="40" r="3" fill="#d4a574" fill-opacity="0.3"/>
    <circle cx="40" cy="80" r="3" fill="#d4a574" fill-opacity="0.3"/>
    <circle cx="80" cy="80" r="3" fill="#d4a574" fill-opacity="0.3"/>
  </g>
  
  <!-- Corner markers -->
  <path d="M20 40V20h20" stroke="#3f3f46" stroke-width="2" fill="none"/>
  <path d="M380 40V20h-20" stroke="#3f3f46" stroke-width="2" fill="none"/>
  <path d="M20 360v20h20" stroke="#3f3f46" stroke-width="2" fill="none"/>
  <path d="M380 360v20h-20" stroke="#3f3f46" stroke-width="2" fill="none"/>
</svg>