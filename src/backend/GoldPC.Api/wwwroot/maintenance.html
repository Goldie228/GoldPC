<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoldPC — Ведутся технические работы</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0; padding: 1rem;
        }
        .card {
            text-align: center; padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; max-width: 480px; width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .icon { font-size: 64px; margin-bottom: 1rem; display: block; }
        h1 { font-size: 24px; font-weight: 700; color: #ffffff; margin-bottom: 0.5rem; }
        p { font-size: 16px; line-height: 1.6; color: #a0a0b0; margin-bottom: 0.5rem; }
        .subtitle { font-size: 14px; color: #6c6c80; }
        .logo { font-size: 28px; font-weight: 800; color: #f5c518; margin-bottom: 1.5rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔧</span>
        <div class="logo">GOLDPC</div>
        <h1>Ведутся технические работы</h1>
        <p>Мы обновляем систему, чтобы сделать сервис ещё лучше.</p>
        <p class="subtitle">Пожалуйста, зайдите через несколько минут.</p>
    </div>
</body>
</html>
