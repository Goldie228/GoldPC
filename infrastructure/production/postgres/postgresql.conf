# =============================================================================
# GoldPC Production PostgreSQL Configuration
# PostgreSQL 16 Optimized Settings
# =============================================================================
# Version: 1.0
# Description: Production-optimized PostgreSQL configuration for GoldPC
# Hardware assumptions: 8GB RAM, 4 CPU cores, SSD storage
# =============================================================================

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================
# Maximum number of concurrent connections
max_connections = 200

# Superuser connections reserved for maintenance
superuser_reserved_connections = 3

# Authentication timeout
authentication_timeout = 60s

# Password encryption
password_encryption = scram-sha-256

# SSL Configuration (enable in production)
ssl = on
ssl_cert_file = '/etc/ssl/certs/ssl-cert-snakeoil.pem'
ssl_key_file = '/etc/ssl/private/ssl-cert-snakeoil.key'
ssl_min_protocol_version = 'TLSv1.2'
ssl_prefer_server_ciphers = on

# =============================================================================
# MEMORY SETTINGS
# =============================================================================
# Shared memory buffer (25-40% of total RAM, ~2GB for 8GB RAM)
shared_buffers = 2GB

# Memory for each connection's operations
work_mem = 32MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 512MB

# Memory for autovacuum workers
autovacuum_work_mem = 256MB

# WAL buffers (default is typically fine, but can be increased)
wal_buffers = 64MB

# Huge pages (enable on Linux for large memory systems)
# huge_pages = try

# =============================================================================
# BACKGROUND WRITER SETTINGS
# =============================================================================
# How often the background writer runs
bgwriter_delay = 200ms

# Maximum pages written per round
bgwriter_lru_maxpages = 100

# Multiplier for estimating dirty pages
bgwriter_lru_multiplier = 2.0

# =============================================================================
# CHECKPOINT SETTINGS
# =============================================================================
# Time between checkpoints
checkpoint_timeout = 15min

# Maximum size between checkpoints
max_wal_size = 2GB
min_wal_size = 512MB

# Checkpoint completion target (0.0 - 1.0)
checkpoint_completion_target = 0.9

# =============================================================================
# WAL SETTINGS
# =============================================================================
# WAL level for replication and Point-in-Time Recovery
wal_level = replica

# Synchronous commit (off = better performance, on = data safety)
synchronous_commit = on

# WAL writer delay
wal_writer_delay = 200ms

# WAL compression
wal_compression = on

# =============================================================================
# QUERY PLANNER SETTINGS
# =============================================================================
# Random page cost (lower for SSDs)
random_page_cost = 1.1

# Effective cache size (should be ~75% of total RAM)
effective_cache_size = 6GB

# Default statistics target
default_statistics_target = 100

# Enable parallel query execution
max_parallel_workers_per_gather = 4
max_parallel_workers = 4
max_parallel_maintenance_workers = 4

# =============================================================================
# LOGGING SETTINGS
# =============================================================================
# Log destination
log_destination = 'stderr'

# Log directory and filename
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600

# Log rotation
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 100MB

# What to log
log_connections = on
log_disconnections = on
log_duration = off
log_line_prefix = '%t [%p] %u@%d '
log_statement = 'ddl'
log_min_duration_statement = 1000

# Log lock waits
log_lock_waits = on

# =============================================================================
# AUTOVACUUM SETTINGS
# =============================================================================
# Enable autovacuum
autovacuum = on

# Maximum autovacuum workers
autovacuum_max_workers = 3

# Time between autovacuum runs
autovacuum_naptime = 1min

# Threshold for triggering vacuum
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# Scale factors
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# Cost limits
autovacuum_vacuum_cost_limit = 200
autovacuum_vacuum_cost_delay = 2ms

# =============================================================================
# STATEMENT TIMEOUT
# =============================================================================
# Maximum statement duration (30 minutes for complex queries)
statement_timeout = 1800000

# Lock timeout
lock_timeout = 30000

# Idle transaction timeout
idle_in_transaction_session_timeout = 600000

# =============================================================================
# REPLICATION SETTINGS (Primary)
# =============================================================================
# Maximum replication slots
max_replication_slots = 5

# Maximum WAL senders
max_wal_senders = 5

# WAL keep size
wal_keep_size = 256MB

# Hot standby
hot_standby = on

# =============================================================================
# STATISTICS SETTINGS
# =============================================================================
# Track activities
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# Statistics query string length
track_activity_query_size = 4096

# =============================================================================
# LOCK MANAGEMENT
# =============================================================================
# Maximum locks per transaction
max_locks_per_transaction = 128

# Deadlock timeout
deadlock_timeout = 1s

# =============================================================================
# COMPATIBILITY SETTINGS
# =============================================================================
# Timezone
timezone = 'UTC'

# Datestyle
datestyle = 'iso, mdy'

# Locale and encoding
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# Default text search config
default_text_search_config = 'pg_catalog.english'

# =============================================================================
# PG_STAT_STATEMENTS EXTENSION
# =============================================================================
# Enable pg_stat_statements in shared_preload_libraries
# Requires: CREATE EXTENSION pg_stat_statements; in database
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000

# =============================================================================
# SECURITY SETTINGS
# =============================================================================
# Row level security
row_security = on

# =============================================================================
# CUSTOMIZED OPTIONS
# =============================================================================
# Add custom settings here if needed