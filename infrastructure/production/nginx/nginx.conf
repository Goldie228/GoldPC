# =============================================================================
# GoldPC Production Nginx Configuration
# Reverse Proxy with SSL Termination and Blue-Green Deployment Support
# =============================================================================
# Version: 1.0
# Features:
#   - SSL/TLS termination with modern ciphers
#   - Blue-Green deployment routing
#   - Canary deployment support via cookies
#   - Rate limiting for API endpoints
#   - Security headers
#   - Static file caching
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# =============================================================================
# Events Configuration
# =============================================================================
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# =============================================================================
# HTTP Configuration
# =============================================================================
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging Configuration
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":"$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # -------------------------------------------------------------------------
    # Performance Tuning
    # -------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Buffer settings
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    client_max_body_size 10M;
    large_client_header_buffers 4 8k;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Rate Limiting Zones
    # -------------------------------------------------------------------------
    # General API rate limit: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Authentication rate limit: 5 requests per minute per IP (stricter for security)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    
    # Login endpoint: 10 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # Security: Hide Nginx Version
    # -------------------------------------------------------------------------
    server_tokens off;

    # -------------------------------------------------------------------------
    # ModSecurity WAF Configuration
    # -------------------------------------------------------------------------
    # modsecurity on;
    # modsecurity_rules_file /etc/nginx/modsec/main.conf;

    # -------------------------------------------------------------------------
    # SSL Session Configuration (shared across servers)
    # -------------------------------------------------------------------------
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # -------------------------------------------------------------------------
    # Upstream Definitions: Blue-Green Backends
    # -------------------------------------------------------------------------
    # Blue Environment (Current Production)
    upstream backend_blue {
        server backend-blue:8080;
        keepalive 32;
    }

    # Green Environment (New Version for Deployment)
    upstream backend_green {
        server backend-green:8080;
        keepalive 32;
    }

    # Frontend
    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # -------------------------------------------------------------------------
    # Map for Blue-Green/Canary Routing
    # Routes traffic based on cookie value
    # -------------------------------------------------------------------------
    # Default to blue environment, route to green if cookie is set
    map $cookie_canary $backend_upstream {
        default backend_blue;
        "green" backend_green;
        "true" backend_green;
    }

    # Map for canary percentage (for gradual rollout)
    # Uses a portion of requests to route to green
    map $request_id $canary_backend {
        default backend_blue;
    }

    # =========================================================================
    # HTTP Server - Redirect to HTTPS
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name goldpc.by www.goldpc.by;

        # Redirect all HTTP traffic to HTTPS
        return 301 https://$server_name$request_uri;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Health check for load balancers
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # =========================================================================
    # HTTPS Server - Main Application
    # =========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name goldpc.by www.goldpc.by;

        # ---------------------------------------------------------------------
        # SSL Configuration
        # ---------------------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/goldpc.by.crt;
        ssl_certificate_key /etc/nginx/ssl/goldpc.by.key;

        # Modern SSL configuration (TLS 1.2 and 1.3 only)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ---------------------------------------------------------------------
        # Security Headers
        # ---------------------------------------------------------------------
        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;
        
        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        
        # Enable XSS filter
        add_header X-XSS-Protection "1; mode=block" always;
        
        # HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.goldpc.by; frame-ancestors 'none';" always;
        
        # Permissions Policy
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

        # ---------------------------------------------------------------------
        # Connection Limits
        # ---------------------------------------------------------------------
        limit_conn conn_limit 50;

        # ---------------------------------------------------------------------
        # Health Check Endpoint
        # ---------------------------------------------------------------------
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }

        # ---------------------------------------------------------------------
        # API Routes - Authentication (Stricter Rate Limiting)
        # ---------------------------------------------------------------------
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Security: Don't cache auth responses
            proxy_cache off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        location /api/v1/auth/register {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_cache off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_cache off;
        }

        # ---------------------------------------------------------------------
        # API Routes - General (Standard Rate Limiting)
        # ---------------------------------------------------------------------
        location /api/v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings for API responses
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ---------------------------------------------------------------------
        # API Routes - Legacy/Fallback
        # ---------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ---------------------------------------------------------------------
        # Local product/manufacturer images - proxy to CatalogService
        # ---------------------------------------------------------------------
        location /uploads/ {
            proxy_pass http://$backend_upstream/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ---------------------------------------------------------------------
        # Frontend - React Application
        # ---------------------------------------------------------------------
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ---------------------------------------------------------------------
        # Static Assets Caching
        # ---------------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # Aggressive caching for static assets
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";

            # Log static file requests separately
            access_log off;
        }

        # ---------------------------------------------------------------------
        # Security: Deny Access to Hidden and Sensitive Files
        # ---------------------------------------------------------------------
        # Block internal stubs in production
        location /api/internal/stubs {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|md|txt|yml|yaml)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block access to backup files
        location ~* ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ---------------------------------------------------------------------
        # Error Pages
        # ---------------------------------------------------------------------
        error_page 429 /429.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}