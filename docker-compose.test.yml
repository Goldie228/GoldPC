# =============================================================================
# Docker Compose for E2E Testing Environment
# GoldPC Project - Test Isolation with tmpfs for clean state
# @see development-plan/10-e2e-and-load-testing.md (Section 10.4)
# =============================================================================

services:
  # ===========================================================================
  # Backend Services
  # ===========================================================================
  
  # Catalog Service (Main backend API)
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        SERVICE_NAME: CatalogService
        SERVICE_PORT: 5001
    container_name: goldpc-test-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__DefaultConnection=Host=postgres-test;Port=5432;Database=goldpc_test;Username=test;Password=test
      - ConnectionStrings__PostgreSQL=Host=postgres-test;Port=5432;Database=goldpc_test;Username=test;Password=test
      - ConnectionStrings__Redis=redis-test:6379
      - Redis__Host=redis-test
      - Redis__Port=6379
    ports:
      - "5001:5001"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - goldpc-test-network
    restart: "no"

  # Auth Service
  authservice:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        SERVICE_NAME: AuthService
        SERVICE_PORT: 5003
    container_name: goldpc-test-auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__PostgreSQL=Host=postgres-test;Port=5432;Database=goldpc_test;Username=test;Password=test
      - JwtSettings__Secret=test-secret-key-for-e2e-testing-min-32-chars!
      - JwtSettings__Issuer=goldpc
      - JwtSettings__Audience=goldpc-users
    ports:
      - "5003:5003"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - goldpc-test-network
    restart: "no"

  # PC Builder Service
  pcbuilderservice:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        SERVICE_NAME: PCBuilderService
        SERVICE_PORT: 5002
    container_name: goldpc-test-pcbuilder
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__DefaultConnection=Host=postgres-test;Port=5432;Database=goldpc_test;Username=test;Password=test
      - ConnectionStrings__PostgreSQL=Host=postgres-test;Port=5432;Database=goldpc_test;Username=test;Password=test
      - ConnectionStrings__Redis=redis-test:6379
      - Redis__Host=redis-test
      - Redis__Port=6379
      - CatalogService__Url=http://backend:5001
    ports:
      - "5002:5002"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: >
        sh -c '
          wget --no-verbose --tries=1 --spider http://localhost:5002/health &&
          curl -sf -X POST -H "Content-Type: application/json" -d "{}" http://localhost:5002/api/v1/pcbuilder/check-compatibility > /dev/null
        '
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - goldpc-test-network
    restart: "no"

  # ===========================================================================
  # Frontend Service
  # ===========================================================================
  
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: goldpc-test-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      authservice:
        condition: service_healthy
      pcbuilderservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - goldpc-test-network
    restart: "no"

  # ===========================================================================
  # Database Services (with tmpfs for clean state every run)
  # ===========================================================================
  
  # PostgreSQL Test Database
  postgres-test:
    image: postgres:16-alpine
    container_name: goldpc-test-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: goldpc_test
    ports:
      - "5433:5432"
    # tmpfs ensures clean state every run - data is not persisted
    tmpfs:
      - /var/lib/postgresql/data
      - /var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d goldpc_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - goldpc-test-network
    restart: "no"

  # Redis Test Cache
  redis-test:
    image: redis:7-alpine
    container_name: goldpc-test-redis
    ports:
      - "6380:6379"
    # tmpfs ensures clean state every run - data is not persisted
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - goldpc-test-network
    restart: "no"

  # ===========================================================================
  # E2E Test Runner (Playwright)
  # ===========================================================================
  
  playwright:
    image: mcr.microsoft.com/playwright:v1.40.0-jammy
    container_name: goldpc-test-playwright
    working_dir: /app
    volumes:
      - ./tests/e2e:/app/tests
      - ./tests/e2e/playwright-report:/app/playwright-report
      - ./tests/e2e/test-results:/app/test-results
    environment:
      - BASE_URL=http://frontend:80
      - CI=true
    command: >
      sh -c "
        cd /app/tests &&
        npm ci &&
        npx playwright install chromium firefox webkit &&
        npx playwright test --reporter=html,json
      "
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      authservice:
        condition: service_healthy
    networks:
      - goldpc-test-network
    restart: "no"

# =============================================================================
# Networks
# =============================================================================
networks:
  goldpc-test-network:
    driver: bridge
    name: goldpc-test-network

# =============================================================================
# Notes:
# - tmpfs is used for postgres-test and redis-test to ensure clean state
# - All services use restart: "no" for test environment
# - Health checks ensure proper startup order
# - Playwright runs in its own container with all browsers installed
# =============================================================================