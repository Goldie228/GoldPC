# Prometheus configuration for GoldPC monitoring
# Scrapes .NET services for /metrics endpoints and infrastructure exporters.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── .NET Services (GoldPC.Api, CatalogService, PCBuilderService, AuthService) ──
  - job_name: "goldpc-api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["goldpc-api:5000"]
        labels:
          service: api-gateway

  - job_name: "goldpc-catalog"
    metrics_path: /metrics
    static_configs:
      - targets: ["goldpc-catalog:5001"]
        labels:
          service: catalog-service

  - job_name: "goldpc-pcbuilder"
    metrics_path: /metrics
    static_configs:
      - targets: ["goldpc-pcbuilder:5002"]
        labels:
          service: pcbuilder-service

  - job_name: "goldpc-auth"
    metrics_path: /metrics
    static_configs:
      - targets: ["goldpc-auth:5003"]
        labels:
          service: auth-service

  # ── Infrastructure Exporters ──
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
