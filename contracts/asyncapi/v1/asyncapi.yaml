asyncapi: '2.6.0'
info:
  title: GoldPC Event API
  description: |
    Спецификация событийного взаимодействия для системы GoldPC.
    
    ## Каналы связи
    - **WebSocket** — для уведомлений клиентов в реальном времени
    - **Message Queue** — для асинхронной обработки между сервисами
    
    ## Типы событий
    - **Order Events** — события заказов (публикуются OrdersService)
    - **Service Events** — события услуг сервисного центра (публикуются ServicesService)
    - **Warranty Events** — события гарантии (публикуются WarrantyService)
    - **Notification Events** — уведомления пользователям
    
    ## Сервисы-издатели событий
    | Сервис | События |
    |--------|---------|
    | OrdersService | OrderCreated, OrderStatusChanged, OrderCancelled |
    | ServicesService | ServiceRequestCreated, ServiceRequestAssigned, ServiceRequestStatusChanged, ServiceRequestCompleted |
    | WarrantyService | WarrantyCreated, WarrantyExpiring, WarrantyAnnulled |
    | CatalogService | LowStockAlert, InventoryUpdated |
  version: 1.0.0
  contact:
    name: GoldPC Team
    email: api@goldpc.by

servers:
  websocket:
    url: wss://api.goldpc.by/ws
    protocol: websocket
    description: WebSocket сервер для уведомлений
  rabbitmq:
    url: amqp://rabbitmq.goldpc.by
    protocol: amqp
    description: RabbitMQ для межсервисного взаимодействия

defaultContentType: application/json

channels:
  # === События заказов ===
  order.created:
    description: Событие создания нового заказа
    subscribe:
      summary: Подписка на новые заказы (для Manager)
      message:
        $ref: '#/components/messages/OrderCreated'
    publish:
      summary: Публикация при создании заказа
      message:
        $ref: '#/components/messages/OrderCreated'

  order.status_changed:
    description: Событие изменения статуса заказа
    subscribe:
      summary: Подписка на изменение статуса (для Manager, Client, WarrantyService)
      message:
        $ref: '#/components/messages/OrderStatusChanged'
    publish:
      summary: Публикация при изменении статуса заказа
      message:
        $ref: '#/components/messages/OrderStatusChanged'

  order.cancelled:
    description: Событие отмены заказа
    subscribe:
      summary: Подписка на отмену заказов
      message:
        $ref: '#/components/messages/OrderCancelled'
    publish:
      summary: Публикация при отмене заказа
      message:
        $ref: '#/components/messages/OrderCancelled'

  # === События услуг ===
  service_request.created:
    description: Событие создания заявки на услугу
    subscribe:
      summary: Подписка на новые заявки (для Manager, Master)
      message:
        $ref: '#/components/messages/ServiceRequestCreated'
    publish:
      summary: Публикация при создании заявки на услугу
      message:
        $ref: '#/components/messages/ServiceRequestCreated'

  service_request.assigned:
    description: Событие назначения мастера
    subscribe:
      summary: Подписка на назначение мастера (для Client, Master)
      message:
        $ref: '#/components/messages/ServiceRequestAssigned'
    publish:
      summary: Публикация при назначении мастера
      message:
        $ref: '#/components/messages/ServiceRequestAssigned'

  service_request.status_changed:
    description: Событие изменения статуса заявки
    subscribe:
      summary: Подписка на изменение статуса заявки (для Manager, Client, Master)
      message:
        $ref: '#/components/messages/ServiceRequestStatusChanged'
    publish:
      summary: Публикация при изменении статуса заявки
      message:
        $ref: '#/components/messages/ServiceRequestStatusChanged'

  service_request.completed:
    description: Событие завершения заявки
    subscribe:
      summary: Подписка на завершение заявки (для Manager, Client, WarrantyService)
      message:
        $ref: '#/components/messages/ServiceRequestCompleted'
    publish:
      summary: Публикация при завершении заявки мастером
      message:
        $ref: '#/components/messages/ServiceRequestCompleted'

  # === События гарантии ===
  warranty.created:
    description: Событие создания гарантийного талона
    subscribe:
      summary: Подписка на создание гарантии
      message:
        $ref: '#/components/messages/WarrantyCreated'

  warranty.expiring:
    description: Событие истечения гарантии
    subscribe:
      summary: Подписка на уведомления об истечении гарантии
      message:
        $ref: '#/components/messages/WarrantyExpiring'

  warranty.annulled:
    description: Событие аннулирования гарантии
    subscribe:
      summary: Подписка на аннулирование гарантии
      message:
        $ref: '#/components/messages/WarrantyAnnulled'

  # === Уведомления ===
  notifications.user:
    description: Персональные уведомления пользователя
    parameters:
      userId:
        $ref: '#/components/parameters/userId'
    subscribe:
      summary: WebSocket канал для уведомлений пользователя
      message:
        oneOf:
          - $ref: '#/components/messages/OrderNotification'
          - $ref: '#/components/messages/ServiceNotification'
          - $ref: '#/components/messages/WarrantyNotification'
          - $ref: '#/components/messages/SystemNotification'

  notifications.broadcast:
    description: Широковещательные уведомления
    subscribe:
      summary: WebSocket канал для системных уведомлений
      message:
        $ref: '#/components/messages/SystemNotification'

  # === События склада ===
  inventory.low_stock:
    description: Событие низкого остатка товара
    subscribe:
      summary: Подписка для менеджеров на низкий остаток
      message:
        $ref: '#/components/messages/LowStockAlert'

  inventory.updated:
    description: Событие обновления остатков
    subscribe:
      summary: Подписка на обновление остатков
      message:
        $ref: '#/components/messages/InventoryUpdated'

components:
  parameters:
    userId:
      description: ID пользователя для персонального канала
      schema:
        type: string
        format: uuid

  messages:
    # === Сообщения заказов ===
    OrderCreated:
      name: OrderCreated
      title: Заказ создан
      contentType: application/json
      description: |
        Публикуется сервисом OrdersService при создании нового заказа.
        Точка публикации: OrdersService.CreateAsync()
      tags:
        - name: OrdersService
        - name: business-event
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
            description: Уникальный ID события (GUID)
          eventType:
            type: string
            enum: [OrderCreated]
            description: Тип события
          timestamp:
            type: string
            format: date-time
            description: Время события (UTC)
          data:
            type: object
            required: [orderId, orderNumber, userId, status, total, deliveryMethod, paymentMethod]
            properties:
              orderId:
                type: string
                format: uuid
                description: ID заказа
              orderNumber:
                type: string
                pattern: '^ORD-\d{4}-\d{4}$'
                example: "ORD-2026-0001"
                description: Номер заказа (формат ORD-YYYY-NNNN)
              userId:
                type: string
                format: uuid
                description: ID пользователя (клиента)
              status:
                type: string
                enum: [New]
                description: Статус (всегда New при создании)
              total:
                type: number
                minimum: 0
                description: Общая сумма заказа
              deliveryMethod:
                type: string
                enum: [Pickup, Delivery]
                description: Способ получения
              paymentMethod:
                type: string
                enum: [Online, OnReceipt]
                description: Способ оплаты
              address:
                type: string
                maxLength: 500
                description: Адрес доставки (обязателен при Delivery)
              comment:
                type: string
                maxLength: 1000
                description: Комментарий к заказу
              items:
                type: array
                minItems: 1
                description: Позиции заказа (минимум 1, максимум 5 единиц каждого товара по ФТ-3.11)
                items:
                  type: object
                  required: [productId, productName, quantity, unitPrice]
                  properties:
                    productId:
                      type: string
                      format: uuid
                      description: ID товара
                    productName:
                      type: string
                      maxLength: 255
                      description: Название товара
                    quantity:
                      type: integer
                      minimum: 1
                      maximum: 5
                      description: Количество (макс. 5 по ФТ-3.11)
                    unitPrice:
                      type: number
                      minimum: 0
                      description: Цена за единицу
                    totalPrice:
                      type: number
                      minimum: 0
                      description: Общая стоимость позиции (quantity * unitPrice)
              createdAt:
                type: string
                format: date-time
                description: Дата создания заказа
          metadata:
            type: object
            properties:
              source:
                type: string
                example: "OrdersService"
              version:
                type: string
                example: "1.0"
              correlationId:
                type: string
                format: uuid
                description: ID для трассировки запроса

    OrderStatusChanged:
      name: OrderStatusChanged
      title: Статус заказа изменён
      contentType: application/json
      description: |
        Публикуется сервисом OrdersService при изменении статуса заказа.
        Точка публикации: OrdersService.UpdateStatusAsync()
        
        ## Машина состояний (State Machine)
        - New → Processing, Cancelled
        - Processing → Paid, Cancelled
        - Paid → InProgress, Cancelled
        - InProgress → Ready
        - Ready → Completed
        - Completed → (финальный)
        - Cancelled → (финальный)
      tags:
        - name: OrdersService
        - name: business-event
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
            description: Уникальный ID события (GUID)
          eventType:
            type: string
            enum: [OrderStatusChanged]
            description: Тип события
          timestamp:
            type: string
            format: date-time
            description: Время события (UTC)
          data:
            type: object
            required: [orderId, orderNumber, userId, oldStatus, newStatus, changedBy]
            properties:
              orderId:
                type: string
                format: uuid
                description: ID заказа
              orderNumber:
                type: string
                pattern: '^ORD-\d{4}-\d{4}$'
                example: "ORD-2026-0001"
                description: Номер заказа
              userId:
                type: string
                format: uuid
                description: ID пользователя (клиента)
              oldStatus:
                type: string
                enum: [New, Processing, Paid, InProgress, Ready, Completed, Cancelled]
                description: Предыдущий статус заказа
              newStatus:
                type: string
                enum: [New, Processing, Paid, InProgress, Ready, Completed, Cancelled]
                description: Новый статус заказа
              changedBy:
                type: string
                format: uuid
                description: ID пользователя, изменившего статус
              comment:
                type: string
                maxLength: 500
                description: Комментарий к изменению статуса
              isPaid:
                type: boolean
                description: Признак оплаты (true при статусе Paid)
              paidAt:
                type: string
                format: date-time
                description: Дата оплаты (при статусе Paid)
          metadata:
            type: object
            properties:
              source:
                type: string
                example: "OrdersService"
              version:
                type: string
                example: "1.0"
              correlationId:
                type: string
                format: uuid
                description: ID для трассировки запроса

    OrderCancelled:
      name: OrderCancelled
      title: Заказ отменён
      contentType: application/json
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [OrderCancelled]
          timestamp:
            type: string
            format: date-time
          data:
            type: object
            required: [orderId, reason]
            properties:
              orderId:
                type: string
                format: uuid
              orderNumber:
                type: string
              userId:
                type: string
                format: uuid
              reason:
                type: string
              cancelledBy:
                type: string
                format: uuid

    # === Сообщения услуг ===
    ServiceRequestCreated:
      name: ServiceRequestCreated
      title: Заявка на услугу создана
      contentType: application/json
      description: |
        Публикуется сервисом ServicesService при создании заявки на услугу.
        Точка публикации: ServicesService.CreateAsync()
        
        ## Типы услуг
        - Diagnostics — Диагностика
        - Repair — Ремонт
        - Assembly — Сборка ПК
        - Cleaning — Чистка
        - Prevention — Профилактика
      tags:
        - name: ServicesService
        - name: business-event
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
            description: Уникальный ID события (GUID)
          eventType:
            type: string
            enum: [ServiceRequestCreated]
            description: Тип события
          timestamp:
            type: string
            format: date-time
            description: Время события (UTC)
          data:
            type: object
            required: [serviceRequestId, requestNumber, clientId, serviceTypeId, status]
            properties:
              serviceRequestId:
                type: string
                format: uuid
                description: ID заявки
              requestNumber:
                type: string
                pattern: '^SR-\d{4}-\d{6}$'
                example: "SR-2026-000001"
                description: Номер заявки (формат SR-YYYY-NNNNNN)
              clientId:
                type: string
                format: uuid
                description: ID клиента
              serviceTypeId:
                type: string
                format: uuid
                description: ID типа услуги
              serviceTypeName:
                type: string
                description: Название типа услуги
              status:
                type: string
                enum: [New]
                description: Статус (всегда New при создании)
              description:
                type: string
                minLength: 10
                maxLength: 2000
                description: Описание проблемы
              deviceModel:
                type: string
                maxLength: 100
                description: Модель устройства
              serialNumber:
                type: string
                maxLength: 50
                description: Серийный номер устройства
              estimatedCost:
                type: number
                minimum: 0
                description: Ориентировочная стоимость (BasePrice типа услуги)
              createdAt:
                type: string
                format: date-time
                description: Дата создания заявки
          metadata:
            type: object
            properties:
              source:
                type: string
                example: "ServicesService"
              version:
                type: string
                example: "1.0"
              correlationId:
                type: string
                format: uuid
                description: ID для трассировки запроса

    ServiceRequestAssigned:
      name: ServiceRequestAssigned
      title: Мастер назначен
      contentType: application/json
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [ServiceRequestAssigned]
          timestamp:
            type: string
            format: date-time
          data:
            type: object
            required: [serviceRequestId, masterId]
            properties:
              serviceRequestId:
                type: string
                format: uuid
              requestNumber:
                type: string
              masterId:
                type: string
                format: uuid
              masterName:
                type: string
              assignedBy:
                type: string
                format: uuid

    ServiceRequestStatusChanged:
      name: ServiceRequestStatusChanged
      title: Статус заявки изменён
      contentType: application/json
      description: |
        Публикуется сервисом ServicesService при изменении статуса заявки.
        Точка публикации: ServicesService.UpdateStatusAsync()
        
        ## Машина состояний (State Machine)
        - New → InProgress (при назначении мастера), Cancelled
        - InProgress → Completed
        - Completed → Closed
        - Closed → (финальный)
        - Cancelled → (финальный)
      tags:
        - name: ServicesService
        - name: business-event
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
            description: Уникальный ID события (GUID)
          eventType:
            type: string
            enum: [ServiceRequestStatusChanged]
            description: Тип события
          timestamp:
            type: string
            format: date-time
            description: Время события (UTC)
          data:
            type: object
            required: [serviceRequestId, requestNumber, oldStatus, newStatus, changedBy]
            properties:
              serviceRequestId:
                type: string
                format: uuid
                description: ID заявки
              requestNumber:
                type: string
                pattern: '^SR-\d{4}-\d{6}$'
                example: "SR-2026-000001"
                description: Номер заявки
              clientId:
                type: string
                format: uuid
                description: ID клиента
              masterId:
                type: string
                format: uuid
                description: ID мастера (если назначен)
              oldStatus:
                type: string
                enum: [New, InProgress, Completed, Closed, Cancelled]
                description: Предыдущий статус заявки
              newStatus:
                type: string
                enum: [New, InProgress, Completed, Closed, Cancelled]
                description: Новый статус заявки
              changedBy:
                type: string
                format: uuid
                description: ID пользователя, изменившего статус
              comment:
                type: string
                maxLength: 500
                description: Комментарий к изменению статуса
          metadata:
            type: object
            properties:
              source:
                type: string
                example: "ServicesService"
              version:
                type: string
                example: "1.0"
              correlationId:
                type: string
                format: uuid
                description: ID для трассировки запроса

    ServiceRequestCompleted:
      name: ServiceRequestCompleted
      title: Заявка завершена
      contentType: application/json
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [ServiceRequestCompleted]
          timestamp:
            type: string
            format: date-time
          data:
            type: object
            required: [serviceRequestId, totalCost]
            properties:
              serviceRequestId:
                type: string
                format: uuid
              requestNumber:
                type: string
              clientId:
                type: string
                format: uuid
              masterId:
                type: string
                format: uuid
              workDescription:
                type: string
              laborCost:
                type: number
              partsCost:
                type: number
              totalCost:
                type: number
              warrantyCreated:
                type: boolean

    # === Сообщения гарантии ===
    WarrantyCreated:
      name: WarrantyCreated
      title: Гарантийный талон создан
      contentType: application/json
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [WarrantyCreated]
          timestamp:
            type: string
            format: date-time
          data:
            type: object
            required: [warrantyId, productId, clientId, endDate]
            properties:
              warrantyId:
                type: string
                format: uuid
              warrantyNumber:
                type: string
                example: "WAR-000001-0001"
              productId:
                type: string
                format: uuid
              productName:
                type: string
              clientId:
                type: string
                format: uuid
              warrantyType:
                type: string
                enum: [Product, Service]
              warrantyMonths:
                type: integer
              startDate:
                type: string
                format: date
              endDate:
                type: string
                format: date
              orderId:
                type: string
                format: uuid
              serviceRequestId:
                type: string
                format: uuid

    WarrantyExpiring:
      name: WarrantyExpiring
      title: Гарантия скоро истечёт
      contentType: application/json
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [WarrantyExpiring]
          timestamp:
            type: string
            format: date-time
          data:
            type: object
            required: [warrantyId, clientId, daysRemaining]
            properties:
              warrantyId:
                type: string
                format: uuid
              warrantyNumber:
                type: string
              clientId:
                type: string
                format: uuid
              clientEmail:
                type: string
              productName:
                type: string
              endDate:
                type: string
                format: date
              daysRemaining:
                type: integer
                description: Дней до окончания гарантии

    WarrantyAnnulled:
      name: WarrantyAnnulled
      title: Гарантия аннулирована
      contentType: application/json
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [WarrantyAnnulled]
          timestamp:
            type: string
            format: date-time
          data:
            type: object
            required: [warrantyId, reason]
            properties:
              warrantyId:
                type: string
                format: uuid
              warrantyNumber:
                type: string
              clientId:
                type: string
                format: uuid
              reason:
                type: string
              annulledBy:
                type: string
                format: uuid

    # === Уведомления ===
    OrderNotification:
      name: OrderNotification
      title: Уведомление о заказе
      contentType: application/json
      payload:
        type: object
        required: [notificationId, type, userId, title, message]
        properties:
          notificationId:
            type: string
            format: uuid
          type:
            type: string
            enum: [OrderCreated, OrderStatusChanged, OrderCancelled, OrderReady]
          userId:
            type: string
            format: uuid
          title:
            type: string
            example: "Заказ готов"
          message:
            type: string
            example: "Ваш заказ ORD-000001-0001 готов к выдаче"
          orderId:
            type: string
            format: uuid
          orderNumber:
            type: string
          createdAt:
            type: string
            format: date-time

    ServiceNotification:
      name: ServiceNotification
      title: Уведомление об услуге
      contentType: application/json
      payload:
        type: object
        required: [notificationId, type, userId, title, message]
        properties:
          notificationId:
            type: string
            format: uuid
          type:
            type: string
            enum: [ServiceCreated, ServiceAssigned, ServiceInProgress, ServiceCompleted]
          userId:
            type: string
            format: uuid
          title:
            type: string
            example: "Ремонт завершён"
          message:
            type: string
            example: "Ваше оборудование готово к выдаче"
          serviceRequestId:
            type: string
            format: uuid
          requestNumber:
            type: string
          createdAt:
            type: string
            format: date-time

    WarrantyNotification:
      name: WarrantyNotification
      title: Уведомление о гарантии
      contentType: application/json
      payload:
        type: object
        required: [notificationId, type, userId, title, message]
        properties:
          notificationId:
            type: string
            format: uuid
          type:
            type: string
            enum: [WarrantyCreated, WarrantyExpiring, WarrantyAnnulled]
          userId:
            type: string
            format: uuid
          title:
            type: string
            example: "Гарантия скоро истечёт"
          message:
            type: string
            example: "Гарантия на AMD Ryzen 7 7800X3D истекает через 30 дней"
          warrantyId:
            type: string
            format: uuid
          warrantyNumber:
            type: string
          createdAt:
            type: string
            format: date-time

    SystemNotification:
      name: SystemNotification
      title: Системное уведомление
      contentType: application/json
      payload:
        type: object
        required: [notificationId, type, title, message]
        properties:
          notificationId:
            type: string
            format: uuid
          type:
            type: string
            enum: [Maintenance, Update, Alert, Info]
          userId:
            type: string
            format: uuid
            description: null для широковещательных
          title:
            type: string
            example: "Техническое обслуживание"
          message:
            type: string
            example: "Система будет недоступна 15.03.2026 с 02:00 до 04:00"
          priority:
            type: string
            enum: [Low, Medium, High, Critical]
          createdAt:
            type: string
            format: date-time

    # === Сообщения склада ===
    LowStockAlert:
      name: LowStockAlert
      title: Предупреждение о низком остатке
      contentType: application/json
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [LowStockAlert]
          timestamp:
            type: string
            format: date-time
          data:
            type: object
            required: [productId, currentStock, threshold]
            properties:
              productId:
                type: string
                format: uuid
              productName:
                type: string
              productSku:
                type: string
              currentStock:
                type: integer
              threshold:
                type: integer
              category:
                type: string

    InventoryUpdated:
      name: InventoryUpdated
      title: Остатки обновлены
      contentType: application/json
      payload:
        type: object
        required: [eventId, eventType, timestamp, data]
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [InventoryUpdated]
          timestamp:
            type: string
            format: date-time
          data:
            type: object
            required: [productId, oldStock, newStock]
            properties:
              productId:
                type: string
                format: uuid
              productName:
                type: string
              oldStock:
                type: integer
              newStock:
                type: integer
              reason:
                type: string
                enum: [Order, Restock, Adjustment, Return]
              orderId:
                type: string
                format: uuid